// ── Utilities ─────────────────────────────────────────────────────────────────

function getMoonPhase(d) {
  const phases = ["🌑 New", "🌒 Waxing Crescent", "🌓 First Quarter", "🌔 Waxing Gibbous", "🌕 Full", "🌖 Waning Gibbous", "🌗 Last Quarter", "🌘 Waning Crescent"];
  // Reference new moon: 2000-01-06 18:14 UTC. The +0.5 centres each phase on
  // its astronomical instant instead of starting it there (half-phase early).
  const diff = (d - new Date("2000-01-06T18:14:00Z")) / 86400000;
  const frac = ((diff % 29.53) + 29.53) % 29.53 / 29.53;
  return phases[Math.floor(frac * 8 + 0.5) % 8];
}
const formatCoords = (lat, lon, acc) => lat == null ? null : `${Math.abs(lat).toFixed(5)}°${lat >= 0 ? "N" : "S"}  ${Math.abs(lon).toFixed(5)}°${lon >= 0 ? "E" : "W"}${acc != null ? `  ±${acc}m` : ""}`;
const fmtDT = iso => new Date(iso).toLocaleString("en-US", {

  day: "numeric",
  year: "numeric",
  hour: "2-digit",
  minute: "2-digit"
});
const fmtTime = iso => new Date(iso).toLocaleTimeString("en-GB", {
  hour: "2-digit",
  minute: "2-digit"

const fmtDateLong = d => d.toLocaleDateString("en-GB", {
  day: "numeric",
  month: "long",
  year: "numeric"
});
const durStr = (s, e) => {
  const m = Math.round((new Date(e) - new Date(s)) / 60000);
  return m < 60 ? `${m}m` : `${Math.floor(m / 60)}h ${m % 60}m`;
};
function geoDistM(lat1, lon1, lat2, lon2) {
  const R = 6371000, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
  const x = dLon * Math.cos((lat1 + lat2) * Math.PI / 360);
  return R * Math.sqrt(dLat * dLat + x * x);
}
// Trolling tracks are arrays of [lat, lon, epochSecs] points, thinned to ≥25m
function trackDistM(track) {

  let d = 0;
  for (let i = 1; i < track.length; i++) d += geoDistM(track[i - 1][0], track[i - 1][1], track[i][0], track[i][1]);

}

  if (!gps) return null;
  let best = null, bestD = 150;
  for (const s of allSpots) {

    const d = geoDistM(gps.lat, gps.lon, s.gps.lat, s.gps.lon);
    if (d < bestD) { bestD = d; best = s.name; }

  return `${cet.getUTCFullYear()}-${p(cet.getUTCMonth() + 1)}-${p(cet.getUTCDate())}T${p(cet.getUTCHours())}:${p(cet.getUTCMinutes())}`;

  const BASE = "https://vannstand.kartverket.no/tideapi.php";
  // Try two CORS proxies in sequence
  const proxies = ["https://corsproxy.io/?", "https://api.allorigins.win/raw?url="];
  const proxyFetch = async url => {
    for (const proxy of proxies) {
      try {
        const ac = new AbortController();
        const timer = setTimeout(() => ac.abort(), 8000);
        let r;
        try {
          r = await fetch(proxy + encodeURIComponent(url), { signal: ac.signal });
        } finally {
          clearTimeout(timer);
        }
        if (r.ok) {
          const t = await r.text();
          // Must look like Kartverket tide XML — proxies sometimes return their own
          // HTML error/challenge pages with status 200, which would otherwise pass
          if (t.includes("<tide")) return t;
        }
      } catch (e) {
        continue;
      }
    }
    throw new Error("all proxies failed");
  };
  const ls = lat.toFixed(6),
    lo = lon.toFixed(6),
    ck = `${ls},${lo}`;
  const cd = new Date(isoTs),
    from = new Date(cd.getTime() - 3600000),  // 60 min before — wide enough for forecast/observation series to appear
    to   = new Date(cd.getTime() + 3600000);  // 60 min after (must use getTime(): Date + number string-concatenates, which Safari rejects as Invalid Date)
  let mhwsCM, mlwsCM;
  if (DATUM_CACHE[ck]) ({ mhwsCM, mlwsCM } = DATUM_CACHE[ck]);
  else {
    const datumUrl = `${BASE}?lat=${ls}&lon=${lo}&refcode=cd&lang=en&tide_request=locationlevels`;
    // Try up to 4 times — CORS proxies are unreliable for this call
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        const txt = await proxyFetch(datumUrl);
        const p = parseKartverketXML(txt);
        if (p?.type === "levels" && p.mhws != null && p.mlws != null) {
          mhwsCM = p.mhws;
          mlwsCM = p.mlws;
          DATUM_CACHE[ck] = { mhwsCM, mlwsCM };
          saveDatumCache();
          break;
        }
      } catch (e) {
        if (attempt === 3) console.warn("datum levels failed after 4 attempts", e);
      }
    }
  }
  // Retry like the datum call above — free CORS proxies fail transiently all
  // the time, and this is the call that actually produces the water level
  let txt2 = null, txt2Err = null;
  for (let attempt = 0; attempt < 3 && txt2 == null; attempt++) {
    try {
      txt2 = await proxyFetch(`${BASE}?lat=${ls}&lon=${lo}&fromtime=${toKartverketTime(from)}&totime=${toKartverketTime(to)}&datatype=all&refcode=cd&lang=en&interval=10&tide_request=locationdata`);
    } catch (e) { txt2Err = e; }
  }
  if (txt2 == null) throw txt2Err || new Error("tide fetch failed");
  // datatype=all returns several series: observation (measured level, stations only),
  // forecast (weather-corrected actual level = Kartverket "Vannstandsvarsel", available everywhere),
  // prediction (astronomical "Beregnet tidevann"), weathereffect (the surge difference).
  // We want the REAL water level a fisherman sees, so prefer forecast, then observation,
  // and fall back to the astronomical prediction only if neither is available.
  const doc2 = new DOMParser().parseFromString(txt2, "text/xml");
  const series = {};
  [...doc2.querySelectorAll("data")].forEach(d => {
    const type = (d.getAttribute("type") || "").toLowerCase();
    series[type] = [...d.querySelectorAll("waterlevel")].map(el => ({
      t: new Date(el.getAttribute("time")),
      v: parseFloat(el.getAttribute("value"))
    })).filter(x => !isNaN(x.v) && !isNaN(x.t.getTime())).sort((a, b) => a.t - b.t);
  });
  const pick = (...names) => { for (const n of names) if (series[n] && series[n].length) return series[n]; return []; };
  const levelSeries = pick("forecast", "observation", "prediction");  // real water level
  const dirSeries   = pick("forecast", "prediction", "observation");  // dense continuous curve for trend
  if (!levelSeries.length) return null;
  // Value at catch time from the real-water-level series
  const closest = levelSeries.reduce((a, b) => Math.abs(a.t - cd) < Math.abs(b.t - cd) ? a : b);
  // Direction: compare first third vs last third of the trend series
  let direction = null;
  if (dirSeries.length >= 3) {
    const third = Math.floor(dirSeries.length / 3);
    const early = dirSeries.slice(0, third).reduce((s, x) => s + x.v, 0) / third;
    const late  = dirSeries.slice(-third).reduce((s, x) => s + x.v, 0) / third;
    direction = late > early ? "rising" : "falling";
  } else if (dirSeries.length === 2) {
    direction = dirSeries[1].v > dirSeries[0].v ? "rising" : "falling";
  }
  const seasonal = mhwsCM != null && mlwsCM != null ? normalizeTide(closest.v, mlwsCM, mhwsCM) : null;

  // ── Next HW / LW via datatype=tab (next 14 hours) ──
  let nextHigh = null, nextLow = null;
  try {
    const tabFrom = new Date(cd);
    const tabTo   = new Date(cd.getTime() + 14 * 3600000);
    const txtTab = await proxyFetch(`${BASE}?lat=${ls}&lon=${lo}&fromtime=${toKartverketTime(tabFrom)}&totime=${toKartverketTime(tabTo)}&datatype=tab&refcode=cd&lang=en&tide_request=locationdata`);
    const docTab = new DOMParser().parseFromString(txtTab, "text/xml");
    const tabEls = [...docTab.querySelectorAll("waterlevel")].map(el => ({
      t: new Date(el.getAttribute("time")),
      v: parseFloat(el.getAttribute("value")),
      flag: (el.getAttribute("flag") || "").toUpperCase()
    })).filter(x => !isNaN(x.v) && !isNaN(x.t.getTime()) && x.t > cd);
    nextHigh = tabEls.find(x => x.flag === "HIGH") || null;
    nextLow  = tabEls.find(x => x.flag === "LOW") || null;
  } catch (e) {
    console.warn("tide tab fetch failed", e);
  }

  return {
    valueCM: closest.v,
    seasonal,
    direction,
    mhwsCM,
    mlwsCM,
    nextHigh,
    nextLow
  };
}

// ── GPS / env hook ────────────────────────────────────────────────────────────

function useEnv() {
  const [gps, setGps] = useState(null);
  const [gpsStatus, setGpsStatus] = useState("idle");
  const [weather, setWeather] = useState(null);
  const [weatherStatus, setWeatherStatus] = useState("idle");
  const [tide, setTide] = useState(null);
  const [tideStatus, setTideStatus] = useState("idle");
  const fetchEnv = useCallback(async (la, lo, ts) => {
    // Weather and tide run in PARALLEL — tide used to wait behind the whole
    // weather/Frost chain (up to ~30s on flaky proxies) before even starting
    const weatherTask = (async () => {
    setWeatherStatus("loading");
    try {
      // --- Current conditions from met.no Locationforecast (Norwegian model, sea-level pressure) ---
      // 4-decimal coords (met.no ToS; ~11m precision is plenty) and a real
      // timeout so a stalled connection can't pin the panel on "loading"
      const metAc = new AbortController();
      const metTimer = setTimeout(() => metAc.abort(), 10000);
      let metResp;
      try {
        metResp = await fetch(
          `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${(+la).toFixed(4)}&lon=${(+lo).toFixed(4)}`,
          { signal: metAc.signal }
        );
      } finally {
        clearTimeout(metTimer);
      }
      if (!metResp.ok) throw new Error('met.no HTTP ' + metResp.status);
      const metData = await metResp.json();
      // Pick the timeseries entry whose time is closest to now
      // (timeseries[0] is the model-run start, which can be 1-2 hours in the past)
      const series = metData.properties?.timeseries || [];
      const nowMs = Date.now();
      let best = series[0];
      for (let i = 1; i < series.length; i++) {
        const d = Math.abs(new Date(series[i].time).getTime() - nowMs);
        if (d < Math.abs(new Date(best.time).getTime() - nowMs)) best = series[i];
        else break; // entries are chronological, once gap grows we've passed "now"
      }
      const instant = best?.data?.instant?.details;
      const pressure = instant?.air_pressure_at_sea_level != null
        ? Math.round(instant.air_pressure_at_sea_level * 10) / 10
        : null;
      const airTemp = instant?.air_temperature != null
        ? Math.round(instant.air_temperature * 10) / 10
        : null;
      const windSpeed = instant?.wind_speed != null
        ? Math.round(instant.wind_speed * 10) / 10
        : null;
      const windDir = instant?.wind_from_direction != null
        ? Math.round(instant.wind_from_direction)
        : null;

      // --- 24h pressure history from Frost API ---
      // Route through corsproxy.io: corsproxy.io's own CORS policy allows the
      // Authorization header (Access-Control-Allow-Headers: *), so the browser
      // preflight succeeds against corsproxy.io, which then forwards the header
      // to Frost. client_secret intentionally omitted.
      let pressureHistory = null;
      try {
        const FROST_ID = '15f1c5d3-8ff3-4f4e-a7e2-8f358ae24cc3';
        const frostAuth = 'Basic ' + btoa(FROST_ID + ':');
        const frostGet = async (path) => {
          const target = 'https://frost.met.no' + path;
          // Two-proxy fallback like the tide fetch — one flaky free proxy
          // shouldn't silently kill the pressure trend for the day
          const proxies = ['https://corsproxy.io/?', 'https://api.allorigins.win/raw?url='];
          let lastErr;
          for (const proxy of proxies) {
            const ac = new AbortController();
            const tid = setTimeout(() => ac.abort(), 10000);
            try {
              const r = await fetch(proxy + encodeURIComponent(target), { headers: { Authorization: frostAuth }, signal: ac.signal });
              if (r.ok) return await r.json();
              lastErr = new Error('Frost HTTP ' + r.status);
            } catch (e) {
              lastErr = e;
            } finally {
              clearTimeout(tid);
            }
          }
          throw lastErr;
        };
        // Step 1: find nearest station with pressure observations
        const geomParam = encodeURIComponent(`nearest(POINT(${lo} ${la}))`);
        const srcData = await frostGet(`/sources/v0.jsonld?geometry=${geomParam}&elements=air_pressure_at_sea_level`);
        const stId = srcData.data?.[0]?.id;
        if (stId) {
          // Step 2: fetch last 24h of hourly pressure observations
          const tTo = new Date();
          const tFrom = new Date(tTo.getTime() - 24 * 3600000);
          const isoFrom = tFrom.toISOString().slice(0, 19) + 'Z';
          const isoTo   = tTo.toISOString().slice(0, 19) + 'Z';
          const obsData = await frostGet(`/observations/v0.jsonld?sources=${stId}&elements=air_pressure_at_sea_level&referencetime=${isoFrom}/${isoTo}&timeresolutions=PT1H`);
          if (obsData.data?.length >= 2) {
            const frostPts = obsData.data
              .sort((a, b) => new Date(a.referenceTime) - new Date(b.referenceTime))
              .map(r => r.observations?.[0]?.value)
              .filter(v => v != null)
              .map(v => Math.round(v * 10) / 10);
            // Append current met.no value so sparkline extends to "now"
            pressureHistory = pressure != null ? [...frostPts, pressure] : frostPts;
          }
        }
      } catch (fe) {
        console.warn('Frost API unavailable, sparkline hidden:', fe.message);
      }

      // Trend: compare current vs 3 hours ago (reflects what is happening now,
      // not a 12h average). Thresholds: rapid ≥1.5 hPa/3h, slow ≥0.5 hPa/3h.
      let pressureTrend = null;
      let pressureLabel = null;
      if (pressure != null && pressureHistory && pressureHistory.length >= 2) {
        const oldPressure = pressureHistory[Math.max(0, pressureHistory.length - 4)];
        const diff = pressure - oldPressure;
        const absDiff = Math.abs(diff);
        const dir = diff > 0.3 ? "rising" : diff < -0.3 ? "falling" : "steady";
        const speed = absDiff >= 1.5 ? "rapidly" : absDiff >= 0.5 ? "slowly" : "";
        pressureTrend = dir;
        pressureLabel = dir === "steady" ? "Steady" : speed ? `${speed.charAt(0).toUpperCase() + speed.slice(1)} ${dir}` : dir.charAt(0).toUpperCase() + dir.slice(1);
      }
      // Pressure absolute label
      const pressureLevel = pressure == null ? null :
        pressure >= 1025 ? "Very High" :
        pressure >= 1015 ? "High" :
        pressure >= 1005 ? "Normal" :
        pressure >= 995  ? "Low" : "Very Low";
      setWeather({
        airTemp,
        pressure,
        pressureLevel,
        pressureTrend,
        pressureLabel,
        pressureHistory,
        windSpeed,
        windDir,
        moon: getMoonPhase(new Date())
      });
      setWeatherStatus("ok");
    } catch (e) {
      console.warn('fetchEnv weather error', e);
      setWeatherStatus("error");
    }
    })();
    const tideTask = (async () => {
    setTideStatus("loading");
    try {
      const res = await fetchTideData(la, lo, ts);
      if (res) {
        setTide(res);
        setTideStatus("ok");
      } else setTideStatus("unavailable");
    } catch (e) {
      console.warn("tide", e);
      setTideStatus("error");
    }
    })();
    await Promise.allSettled([weatherTask, tideTask]);
  }, []);
  // The browser's first fix is often a coarse Wi-Fi/cell estimate that can be
  // hundreds of metres off. We use it immediately (UI + weather/tide load with
  // no waiting), then keep watching in the background and silently upgrade the
  // coordinates whenever a more accurate fix arrives — stopping once the fix is
  // ≤20m or after 30s. Records saved meanwhile get the best fix so far.
  // Pass {refine: false} for one-shot rough mode (Live Conditions).
  const watchRef = useRef(null);
  const clearWatch = useCallback(() => {
    if (watchRef.current != null) {
      navigator.geolocation.clearWatch(watchRef.current.id);
      clearTimeout(watchRef.current.timer);
      watchRef.current = null;
    }
  }, []);
  useEffect(() => clearWatch, []);
  const getGPS = useCallback((ts, opts) => {
    const refine = !(opts && opts.refine === false);
    clearWatch();
    setGpsStatus("loading");
    let gotFirst = false, bestAcc = Infinity;
    const accept = pos => {
      const { latitude: la, longitude: lo, accuracy } = pos.coords;
      const acc = accuracy != null && isFinite(accuracy) ? Math.round(accuracy) : null;
      if (acc != null && acc >= bestAcc) return; // only ever upgrade
      if (acc != null) bestAcc = acc;
      setGps({ lat: la, lon: lo, acc });
      if (!gotFirst) {
        gotFirst = true;
        setGpsStatus("ok");
        fetchEnv(la, lo, ts); // weather/tide off the first fix — a few hundred metres doesn't matter there
      }
      if (refine && acc != null && acc <= 20) clearWatch(); // good enough, stop burning battery
    };
    const onError = () => {
      // Ignore errors (e.g. per-fix timeouts) once we already have a position
      if (!gotFirst) {
        setGpsStatus("error");
        clearWatch();
      }
    };
    const geoOpts = { enableHighAccuracy: true, timeout: 15000 };
    if (!refine) {
      navigator.geolocation.getCurrentPosition(accept, onError, geoOpts);
      return;
    }
    const id = navigator.geolocation.watchPosition(accept, onError, geoOpts);
    const timer = setTimeout(clearWatch, 30000);
    watchRef.current = { id, timer };
  }, [fetchEnv, clearWatch]);
  const reset = () => {
    clearWatch();
    setGps(null);
    setGpsStatus("idle");
    setWeather(null);
    setWeatherStatus("idle");
    setTide(null);
    setTideStatus("idle");
  };
  return {
    gps,
    gpsStatus,
    weather,
    weatherStatus,
    tide,
    tideStatus,
    getGPS,
    reset
  };
}

// Forms capture GPS + timestamp once on mount. A PWA stays in memory for hours,
// so a form left open while the phone is locked goes stale and silently records
// the previous location and time. Re-acquire both whenever the app returns to
// the foreground (typed fields are untouched; spot-name autofill only fills an
// empty field).
function useFreshEnvOnReturn(activeRef, getGPS, setTimestamp) {
  useEffect(() => {
    // Only refresh after a real absence (>2 min). Short hides — camera picker,
    // app switcher, notifications — must NOT restart the GPS watch, or a rough
    // first fix would overwrite an already-precise one and weather/tide would
    // re-fetch on every flicker.
    let hiddenAt = null;
    const onVis = () => {
      if (document.hidden) { hiddenAt = Date.now(); return; }
      const awayMs = hiddenAt != null ? Date.now() - hiddenAt : 0;
      hiddenAt = null;
      if (awayMs < 120000) return;
      if (activeRef && activeRef.current === false) return;
      const ts = new Date().toISOString();
      setTimestamp(ts);
      getGPS(ts);
    };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, []);
}

// ── CSV helpers ───────────────────────────────────────────────────────────────

const moonCSV = m => m ? m.replace(/^\S+\s/, "") : "";
const esc = v => {
  if (v == null) return "";
  let s = String(v);
  // Neutralize spreadsheet formula injection in text fields; real numbers
  // pass through as non-strings so negatives stay numeric
  if (typeof v === "string" && /^[=+@\t]/.test(s)) s = "'" + s;
  return /[",\n\r]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
};
const row = cells => cells.map(esc).join(",");
const tripsCSV = (trips, spots, catches, obs) => {

function dlCSV(content, filename) {
  const blob = new Blob(["\uFEFF" + content], {
    type: "text/csv;charset=utf-8;"
  });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Backup / restore / photo export ──────────────────────────────────────────

function dlJSON(obj, filename) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}
function backupAll(trips, spots, catches, observations) {
  var tasks = [];
  var missing = 0;
  var spotsCopy = spots.map(function(s) { return Object.assign({}, s); });
  var catchesCopy = catches.map(function(c) { return Object.assign({}, c); });
  // Photo failures must be visible, not silent — a backup the user believes
  // is complete is the app's last line of defence
  var attach = function(rec, field) {
    if (!isPhotoId(rec[field])) return;
    tasks.push(photoIdToBase64(rec[field]).then(function(b64) {
      if (!b64) missing++;
      rec[field] = b64;
    }).catch(function() { missing++; rec[field] = null; }));
  };
  spotsCopy.forEach(function(s) { attach(s, 'photo'); });
  catchesCopy.forEach(function(c) { attach(c, 'fishPhoto'); attach(c, 'flyPhoto'); });
  Promise.all(tasks).then(function() {
    var today = new Date().toISOString().slice(0, 10);
    dlJSON({ exportedAt: new Date().toISOString(), version: 1, trips: trips, spots: spotsCopy, catches: catchesCopy, observations: observations },
      'catchlog_backup_' + today + '.json');
    if (missing) alert(missing + " photo(s) could not be read and are not in this backup. All catch/spot data is included.");
  }).catch(function(e) {
    alert("Backup failed: " + (e && e.message ? e.message : e));
  });
}
function restoreFromFile(file, onDone) {
  var reader = new FileReader();
  reader.onerror = function() { alert("Could not read the selected file."); };
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      // Strict shape check — a malformed file written to storage would brick
      // the app on next launch
      if (!Array.isArray(data.trips) || !Array.isArray(data.spots) ||
          !Array.isArray(data.catches) || !Array.isArray(data.observations)) {
        alert("Invalid backup file — missing expected data."); return;
      }

// ── Photo storage (IndexedDB) ────────────────────────────────────────────────

var photoDB = {
  _db: null,
  open: function() {
    if (this._db) return Promise.resolve(this._db);
    var self = this;
    return new Promise(function(resolve, reject) {
      var req = indexedDB.open('catchlog-photos', 1);
      req.onupgradeneeded = function(e) {
        e.target.result.createObjectStore('photos', { keyPath: 'id' });
      };
      req.onsuccess = function(e) { self._db = e.target.result; resolve(self._db); };
      req.onerror = function(e) { reject(e.target.error); };
    });
  },
  put: function(id, blob) {
    return this.open().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction('photos', 'readwrite');
        tx.objectStore('photos').put({ id: id, blob: blob });
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function(e) { reject(e.target.error); };
      });
    });
  },
  get: function(id) {
    return this.open().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction('photos', 'readonly');
        var req = tx.objectStore('photos').get(id);
        req.onsuccess = function() { resolve(req.result ? req.result.blob : null); };
        req.onerror = function(e) { reject(e.target.error); };
      });
    });
  },
  del: function(id) {
    if (!isPhotoId(id)) return Promise.resolve();
    return this.open().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction('photos', 'readwrite');
        tx.objectStore('photos').delete(id);
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function(e) { reject(e.target.error); };
      });
    });
  }
};

var photoCache = new Map();

function isPhotoId(v) {
  return typeof v === 'string' && v.startsWith('ph_');
}

function genPhotoId() {
  return 'ph_' + Date.now() + '_' + Math.random().toString(16).slice(2, 10);
}

// Surface storage failures to the user (FishLog shows these as a toast)
function reportStorageError(msg) {
  try { window.dispatchEvent(new CustomEvent('catchlog-storage-error', { detail: msg })); } catch (e) {}
}

function photoIdToBase64(id) {
  if (!id) return Promise.resolve(null);
  if (!isPhotoId(id)) return Promise.resolve(id);
  return photoDB.get(id).then(function(blob) {
    if (!blob) return null;
    return new Promise(function(resolve) {
      var reader = new FileReader();
      reader.onloadend = function() { resolve(reader.result); };
      reader.readAsDataURL(blob);
    });
  });
}

function compressPhoto(file, cb) {
  var img = new Image();
  var url = URL.createObjectURL(file);
  img.onerror = function() {
    URL.revokeObjectURL(url);
    reportStorageError("Photo couldn't be read — unsupported image format");
    cb(null);
  };
  img.onload = function() {
    // Kept at 800px to keep storage small — the zoom viewer just enlarges
    // this; some pixelation when zoomed in is acceptable
    var MAX = 800;
    var scale = Math.min(1, MAX / Math.max(img.width, img.height));
    var w = Math.round(img.width * scale), h = Math.round(img.height * scale);
    var canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    canvas.getContext("2d").drawImage(img, 0, 0, w, h);
    canvas.toBlob(function(blob) {
      if (!blob) {
        reportStorageError("Photo couldn't be processed — not attached");
        cb(null);
        return;
      }
      var id = genPhotoId();
      photoDB.put(id, blob).then(function() {
        photoCache.set(id, URL.createObjectURL(blob));
        cb(id);
      }).catch(function() {
        // Do NOT fall back to base64 in the record: ~100KB strings flood
        // localStorage and push the Firestore doc over its 1MB cap
        reportStorageError("Photo storage unavailable — photo not attached");
        cb(null);
      });
    }, "image/jpeg", 0.7);
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function usePhoto(ref) {

  var s = useState(init);

    if (!isPhotoId(ref)) { setSrc(ref); return; }
    var cancelled = false;
    function tryLoad() {

      var hit = photoCache.get(ref);
      if (hit) { setSrc(hit); return; }
      photoDB.get(ref).then(function(blob) {
        if (cancelled) return;
        if (blob) {
          var u = URL.createObjectURL(blob);
          photoCache.set(ref, u);
          setSrc(u);
        } else {
          try {
            var urls = JSON.parse(localStorage.getItem('cl_photo_urls') || '{}');
            if (urls[ref]) {
              // Display straight from the remote URL — <img> loads cross-origin without CORS.
              setSrc(urls[ref]);
              // Best-effort: cache the blob into IDB for offline use. Needs bucket CORS;
              // harmless if it fails since the image is already displaying via the URL.
              fetch(urls[ref]).then(function(r) { return r.blob(); }).then(function(b) {
                if (cancelled) return;
                photoDB.put(ref, b);
              }).catch(function() {});
            }
          } catch(e) {}
        }
      }).catch(function() {
        // IndexedDB read failed — fall back to the remote URL if we have one
        if (cancelled) return;
        try {
          var urls = JSON.parse(localStorage.getItem('cl_photo_urls') || '{}');
          if (urls[ref]) setSrc(urls[ref]);
        } catch(e) {}
      });
    }
    tryLoad();
    window.addEventListener('catchlog-photos-ready', tryLoad);
    return function() { cancelled = true; window.removeEventListener('catchlog-photos-ready', tryLoad); };

function migratePhotosToIDB() {
  if (localStorage.getItem('cl_photos_migrated') === '1') return Promise.resolve();
  var spotsRaw = localStorage.getItem('fl_spots_v2');
  var catchesRaw = localStorage.getItem('fl_catches_v3');
  var spotArr, catchArr;
  try { spotArr = JSON.parse(spotsRaw || '[]'); } catch(e) { spotArr = []; }
  try { catchArr = JSON.parse(catchesRaw || '[]'); } catch(e) { catchArr = []; }
  var hasBase64 = false;
  spotArr.forEach(function(s) { if (s.photo && s.photo.startsWith('data:')) hasBase64 = true; });
  catchArr.forEach(function(c) {
    if (c.fishPhoto && c.fishPhoto.startsWith('data:')) hasBase64 = true;
    if (c.flyPhoto && c.flyPhoto.startsWith('data:')) hasBase64 = true;
  });
  if (!hasBase64) {
    _origLocalStorageSet('cl_photos_migrated', '1');
    return Promise.resolve();
  }
  return photoDB.open().then(function() {
    var tasks = [];
    spotArr.forEach(function(s) {
      if (s.photo && s.photo.startsWith('data:')) {
        var id = genPhotoId();
        tasks.push(fetch(s.photo).then(function(r) { return r.blob(); }).then(function(blob) {
          return photoDB.put(id, blob);
        }));
        s.photo = id;
      }
    });
    catchArr.forEach(function(c) {
      if (c.fishPhoto && c.fishPhoto.startsWith('data:')) {
        var id = genPhotoId();
        tasks.push(fetch(c.fishPhoto).then(function(r) { return r.blob(); }).then(function(blob) {
          return photoDB.put(id, blob);
        }));
        c.fishPhoto = id;
      }
      if (c.flyPhoto && c.flyPhoto.startsWith('data:')) {
        var id = genPhotoId();
        tasks.push(fetch(c.flyPhoto).then(function(r) { return r.blob(); }).then(function(blob) {
          return photoDB.put(id, blob);
        }));
        c.flyPhoto = id;
      }
    });
    return Promise.all(tasks).then(function() {
      _origLocalStorageSet('fl_spots_v2', JSON.stringify(spotArr));
      _origLocalStorageSet('fl_catches_v3', JSON.stringify(catchArr));
      _origLocalStorageSet('cl_photos_migrated', '1');
      cloudSchedulePush();
    });
  }).catch(function(err) {
    console.error('Photo migration error:', err);
  });
}

// ── Cloud photo sync (Firebase Storage) ──────────────────────────────────────

var _photoSyncRunning = false;

function cloudSyncPhotos(uid) {
  if (_photoSyncRunning) return;
  _photoSyncRunning = true;
  var urlMap;
  try { urlMap = JSON.parse(localStorage.getItem('cl_photo_urls') || '{}'); } catch(e) { urlMap = {}; }
  var spots, catches;
  try { spots = JSON.parse(localStorage.getItem('fl_spots_v2') || '[]'); } catch(e) { spots = []; }
  try { catches = JSON.parse(localStorage.getItem('fl_catches_v3') || '[]'); } catch(e) { catches = []; }
  var ids = [];
  spots.forEach(function(s) { if (isPhotoId(s.photo) && !urlMap[s.photo]) ids.push(s.photo); });
  catches.forEach(function(c) {
    if (isPhotoId(c.fishPhoto) && !urlMap[c.fishPhoto]) ids.push(c.fishPhoto);
    if (isPhotoId(c.flyPhoto) && !urlMap[c.flyPhoto]) ids.push(c.flyPhoto);
  });
  if (!ids.length) { _photoSyncRunning = false; return; }
  var chain = Promise.resolve();
  ids.forEach(function(id) {
    chain = chain.then(function() {
      return photoDB.get(id).then(function(blob) {
        if (!blob) return;
        var ref = fbStorage.ref('users/' + uid + '/photos/' + id + '.jpg');
        return ref.put(blob).then(function() {
          return ref.getDownloadURL();
        }).then(function(url) {
          urlMap[id] = url;
        });
      }).catch(function(err) {
        console.error('Photo upload error (' + id + '):', err);
      });
    });
  });
  chain.then(function() {
    _origLocalStorageSet('cl_photo_urls', JSON.stringify(urlMap));
    return cloudDoc(uid).update({ photoUrls: urlMap });
  }).catch(function(err) {
    console.error('Photo sync error:', err);
  }).then(function() {
    _photoSyncRunning = false;
  });
}

function cloudDeletePhoto(photoId) {
  if (!isPhotoId(photoId)) return;
  var user = fbAuth.currentUser;
  if (user) {
    fbStorage.ref('users/' + user.uid + '/photos/' + photoId + '.jpg').delete().catch(function() {});
  }
  try {
    var map = JSON.parse(localStorage.getItem('cl_photo_urls') || '{}');
    delete map[photoId];
    _origLocalStorageSet('cl_photo_urls', JSON.stringify(map));
  } catch(e) {}
}

function cloudDownloadPhotos(photoUrls) {
  if (!photoUrls) return;
  // Best-effort offline caching into IDB. Requires Storage bucket CORS; if it's not
  // configured these fetches fail harmlessly — photos still display via direct URL.
  Object.keys(photoUrls).forEach(function(id) {
    photoDB.get(id).then(function(blob) {
      if (blob) return;
      return fetch(photoUrls[id]).then(function(r) { return r.blob(); }).then(function(b) {
        return photoDB.put(id, b);
      });
    }).catch(function() {});
  });
}

// Re-fetch any missing photo URLs from Firebase Storage (recovery after cloudPush wipe)
function cloudRecoverPhotoUrls(uid) {
  var spots, catches;
  try { spots = JSON.parse(localStorage.getItem('fl_spots_v2') || '[]'); } catch(e) { spots = []; }
  try { catches = JSON.parse(localStorage.getItem('fl_catches_v3') || '[]'); } catch(e) { catches = []; }
  var urlMap; try { urlMap = JSON.parse(localStorage.getItem('cl_photo_urls') || '{}'); } catch(e) { urlMap = {}; }
  var ids = [];
  spots.forEach(function(s) { if (isPhotoId(s.photo) && !urlMap[s.photo]) ids.push(s.photo); });
  catches.forEach(function(c) {
    if (isPhotoId(c.fishPhoto) && !urlMap[c.fishPhoto]) ids.push(c.fishPhoto);
    if (isPhotoId(c.flyPhoto) && !urlMap[c.flyPhoto]) ids.push(c.flyPhoto);
  });
  if (!ids.length) return;
  console.log('[catchlog] recovering ' + ids.length + ' photo URL(s) from Storage…');
  var recovered = 0, failed = 0;
  var chain = Promise.resolve();
  ids.forEach(function(id) {
    chain = chain.then(function() {
      return fbStorage.ref('users/' + uid + '/photos/' + id + '.jpg').getDownloadURL().then(function(url) {
        urlMap[id] = url; recovered++;
      }).catch(function(err) {
        failed++;
        console.warn('[catchlog] could not recover photo ' + id + ': ' + (err && err.code ? err.code : err));
      });
    });
  });
  chain.then(function() {
    console.log('[catchlog] photo recovery done — ' + recovered + ' recovered, ' + failed + ' failed');
    _origLocalStorageSet('cl_photo_urls', JSON.stringify(urlMap));
    cloudDownloadPhotos(urlMap);
    window.dispatchEvent(new CustomEvent('catchlog-photos-ready'));
    if (recovered > 0) cloudDoc(uid).update({ photoUrls: urlMap }).catch(function() {});
  });
}

const FLY_LINES = ["Float", "Slow Int", "Fast Int", "Sink3", "Sink5", "Sink7"];
const SPIN_LINES = ["Wobbler", "Sandeel", "Shad", "Softjerk", "Spoon"];
const ALL_LINES = [...FLY_LINES, ...SPIN_LINES];
const TROLL_DEPTHS = ["Surface", "1–2 m", "2–4 m", "4–6 m", "6–10 m", "10+ m"];
const TEMP_OPTIONS = [
  ...Array.from({length: 5}, (_, i) => `${i + 3} °C`),
  ...Array.from({length: 21}, (_, i) => `${(8 + i * 0.5).toFixed(1).replace(/\.0$/, '')} °C`),
  ...Array.from({length: 7}, (_, i) => `${i + 19} °C`)
];
const TARGET_SPECIES = ["Sea Trout", "Sea Bass", "Salmon", "Garfish", "Mackerel", "Mullet"];
function deriveMethod(tripSpots, trip) {
  if (trip && trip.mode === "trolling") return "Trolling";
  const lines = tripSpots.map(s => s.lineType).filter(Boolean);
  if (!lines.length) return null;
  const hasFly = lines.some(l => FLY_LINES.includes(l));
  const hasSpin = lines.some(l => SPIN_LINES.includes(l));
  if (hasFly && hasSpin) return "Fly & Spin";
  if (hasFly) return "Fly";
  if (hasSpin) return "Spin";
  return null;
}
const SK = {
  trips: "fl_trips_v3",
  spots: "fl_spots_v2",
  catches: "fl_catches_v3",
  obs: "fl_obs_v2"
};
const load = k => {
  try {
    return JSON.parse(localStorage.getItem(k) || "[]");
  } catch {
    return [];
  }
};
const persist = (k, d) => {
  try {
    localStorage.setItem(k, JSON.stringify(d));
  } catch (e) {
    // Quota exceeded (or storage unavailable): the record still lives in React
    // state for this session — warn instead of crashing the whole app
    console.error("persist failed", e);
    reportStorageError("Storage is full — entry NOT saved permanently! Export a backup now, then clear photos in Export.");
  }
};
