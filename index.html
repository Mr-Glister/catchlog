<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a18" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Catch Log" />
  <title>The Catch Log v1.2</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a18; }
    #root { min-height: 100vh; }
    #err { display:none; position:fixed; inset:0; background:#1a1a18; color:#f5f0e8;
      font-family:monospace; font-size:12px; padding:20px; overflow-y:auto; z-index:9999;
      white-space:pre-wrap; word-break:break-all; }
  </style>
</head>
<body>
  <div id="err"></div>
  <div id="root"></div>
  <script>
    window.onerror = function(msg,src,line,col,err) {
      var d=document.getElementById('err');
      d.style.display='block';
      d.textContent='ERROR: '+msg+'\nLine: '+line+'\n\n'+(err?err.stack:'');
    };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    const { useState, useRef, useCallback } = React;
  </script>
  <script>
const FONTS = `@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Code+Pro:wght@300;400;500&display=swap');`;
const css = `
  ${FONTS}
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Cool Scandinavian, but confident */
    --ink: #14181d;            /* dark cool charcoal */
    --ink-2: #1f262e;          /* slightly lighter for layered surfaces */
    --paper: #f5f5f3;          /* warm-tinted off-white background */
    --paper-2: #ffffff;        /* card surfaces */
    --slate: #2b5d75;          /* confident slate-blue accent */
    --slate-deep: #1d4357;
    --slate-light: #4e8aa5;
    --moss: #3d5a4a;           /* live session, single use */
    --rule: #e3e3df;           /* hairline */
    --rule-strong: #b8b8b3;
    --text: #14181d;
    --text-2: #4d5560;
    --text-3: #8a8f99;
    --warn: #b85a4a;
  }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--paper); color: var(--text); -webkit-font-smoothing: antialiased; font-feature-settings: 'cv11', 'ss01'; }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--paper); }
  .mono { font-family: 'Source Code Pro', ui-monospace, monospace; }

  /* Header — dark, anchored */
  .header { background: var(--ink); color: var(--paper); padding: 16px 20px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2px; }
  .header-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; color: var(--paper); }
  .header-title span { color: var(--paper); font-weight: 700; font-style: normal; }
  .header-sub { font-size: 9px; color: rgba(255,255,255,.45); letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; }
  .tab-bar { display: flex; gap: 0; margin-top: 14px; }
  .tab { flex: 1; padding: 11px 4px 12px; text-align: center; font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase;
    background: transparent; border: none; border-bottom: 2px solid transparent; color: rgba(255,255,255,.5);
    cursor: pointer; transition: all 0.15s; font-family: inherit; font-weight: 600; }
  .tab:hover { color: rgba(255,255,255,.85); }
  .tab.active { color: var(--paper); border-bottom-color: var(--paper); }

  /* Active session banner */
  .active-banner { background: var(--ink-2); color: var(--paper); padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; border-top: 1px solid rgba(255,255,255,.06); }
  .ab-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .ab-trip { font-size: 9px; color: rgba(255,255,255,.45); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
  .ab-spot { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ab-meta { font-size: 11px; color: rgba(255,255,255,.55); font-family: 'Source Code Pro', monospace; }
  .ab-buttons { display: flex; gap: 6px; flex-shrink: 0; }
  .ab-btn { font-size: 9px; letter-spacing: 1.2px; padding: 7px 11px; border-radius: 2px;
    border: 1px solid rgba(255,255,255,.2); background: transparent; color: var(--paper);
    cursor: pointer; text-transform: uppercase; white-space: nowrap; transition: all .15s; font-family: inherit; font-weight: 600; }
  .ab-btn:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.4); }
  .ab-btn.end { border-color: rgba(255,255,255,.35); }

  .form-wrap { padding: 18px 16px; display: flex; flex-direction: column; gap: 14px; }

  /* Section divider */
  .section-divider { display: flex; align-items: center; gap: 10px; margin: 2px 0; }
  .section-divider-line { flex: 1; height: 1px; background: var(--rule); }
  .section-divider-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); font-weight: 600; }

  /* Photos */
  .photo-grid { display: grid; gap: 10px; }
  .photo-grid-2 { grid-template-columns: 1fr 1fr; }
  .photo-slot { aspect-ratio: 1; border: 1px solid var(--rule); border-radius: 3px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; background: var(--paper-2); position: relative; overflow: hidden; transition: border-color .15s; }
  .photo-slot:hover { border-color: var(--slate-light); }
  .photo-slot img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
  .photo-slot-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); margin-top: 6px; font-weight: 600; }
  .photo-slot-icon { display: none; }
  .photo-slot input { display: none; }

  /* Field groups */
  .field-group { background: var(--paper-2); border: 1px solid var(--rule); border-radius: 3px; overflow: hidden; }
  .field-group-title { background: transparent; color: var(--text-3); font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; padding: 13px 14px 10px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--rule); font-weight: 600; }
  .field-group-title.moss { color: var(--moss); }
  .field-row { display: flex; align-items: center; padding: 12px 14px; gap: 10px; border-bottom: 1px solid var(--rule); }
  .field-row:last-child { border-bottom: none; }
  .field-row.top { align-items: flex-start; padding-top: 14px; padding-bottom: 14px; }
  .field-icon { display: none; }
  .field-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-3); flex-shrink: 0; min-width: 95px; font-weight: 600; }
  .field-label.opt::after { content: ' · opt'; font-size: 8px; color: var(--text-3); letter-spacing: 0; text-transform: none; font-weight: 400; }
  .field-value { flex: 1; font-size: 14px; color: var(--text); font-weight: 500; }
  .field-input { flex: 1; border: none; outline: none; font-family: 'Inter', sans-serif;
    font-size: 14px; color: var(--text); background: transparent; -webkit-appearance: none; font-weight: 500; }
  .field-input::placeholder { color: var(--text-3); font-weight: 400; }
  .field-unit { font-size: 10px; color: var(--text-3); flex-shrink: 0; letter-spacing: 0.5px; }
  .field-num { width: 64px; border: 1px solid var(--rule); border-radius: 3px; padding: 5px 8px;
    font-family: 'Source Code Pro', monospace; font-size: 13px; text-align: center; outline: none; }

  /* Status badges */
  .status-badge { font-size: 9px; letter-spacing: 1.5px; padding: 3px 8px; border-radius: 2px; text-transform: uppercase; font-weight: 600; border: 1px solid; }
  .status-ok      { color: var(--moss); border-color: var(--moss); background: transparent; }
  .status-loading { color: var(--slate); border-color: var(--slate); background: transparent; }
  .status-error   { color: var(--warn); border-color: var(--warn); background: transparent; }

  /* GPS */
  .gps-coords { font-size: 12px; color: var(--slate); font-family: 'Source Code Pro', monospace; }
  .gps-btn { font-size: 9px; letter-spacing: 1.8px; padding: 6px 12px; border-radius: 2px;
    background: var(--ink); color: var(--paper); border: none; cursor: pointer; text-transform: uppercase;
    transition: background .15s; flex-shrink: 0; font-family: inherit; font-weight: 600; }
  .gps-btn:hover { background: var(--slate-deep); }

  /* Tide bar */
  .tide-bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .tide-bar-track { height: 5px; background: var(--rule); border-radius: 0; overflow: hidden; }
  .tide-bar-fill  { height: 100%; background: var(--slate); transition: width .6s ease; }
  .tide-bar-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-3); letter-spacing: 0.5px; font-weight: 500; }
  .tide-value-line { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .tide-normalized { font-size: 16px; font-weight: 600; color: var(--slate); font-family: 'Source Code Pro', monospace; }
  .tide-raw  { font-size: 11px; color: var(--text-3); font-family: 'Source Code Pro', monospace; }
  .tide-hint { font-size: 11px; color: var(--text-2); letter-spacing: 0.3px; font-weight: 500; }

  /* Save button */
  .save-btn { width: 100%; padding: 16px; background: var(--ink); color: var(--paper);
    border: none; font-family: 'Inter', sans-serif; font-size: 11px;
    letter-spacing: 2.5px; text-transform: uppercase; cursor: pointer;
    border-top: none; transition: background .15s; margin-top: 4px; border-radius: 3px; font-weight: 600; }
  .save-btn:hover { background: var(--slate-deep); }
  .save-btn:disabled { opacity: .35; cursor: not-allowed; }
  .save-btn.green { background: var(--moss); }
  .save-btn.green:hover { background: #2f4639; }

  /* Lists & empty states */
  .log-wrap { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-3); }
  .empty-icon { display: none; }
  .empty-text { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }

  /* Trip cards */
  .trip-card { background: var(--paper-2); border: 1px solid var(--rule); border-radius: 3px; overflow: hidden; cursor: pointer; transition: all .15s; }
  .trip-card:hover { border-color: var(--rule-strong); }
  .trip-card-header { display: flex; }
  .trip-thumb { width: 72px; height: 72px; object-fit: cover; flex-shrink: 0; background: var(--rule); display:flex;align-items:center;justify-content:center; font-size:0; }
  .trip-meta { flex: 1; padding: 11px 14px; display: flex; flex-direction: column; justify-content: space-between; min-width:0; }
  .trip-name { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .trip-date { font-size: 11px; color: var(--text-3); font-family: 'Source Code Pro', monospace; }
  .trip-duration { font-size: 11px; color: var(--text-2); font-family: 'Source Code Pro', monospace; }
  .trip-footer { display: flex; flex-wrap: wrap; gap: 6px; padding: 9px 14px; border-top: 1px solid var(--rule); }
  .trip-active-badge { background: var(--moss); color: var(--paper); border: none; font-size: 9px; padding: 3px 9px; border-radius: 2px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }

  /* Catch cards */
  .catch-card { background: var(--paper-2); border: 1px solid var(--rule); border-radius: 3px; overflow: hidden; cursor: pointer; transition: all .15s; }
  .catch-card:hover { border-color: var(--rule-strong); }
  .catch-card-header { display: flex; }
  .catch-thumb { width: 72px; height: 72px; object-fit: cover; flex-shrink: 0; background: var(--rule); display:flex;align-items:center;justify-content:center; }
  .catch-thumb-placeholder { display: none; }
  .catch-meta { flex: 1; padding: 11px 14px; display: flex; flex-direction: column; justify-content: space-between; min-width:0; }
  .catch-species { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .catch-date { font-size: 11px; color: var(--text-3); font-family: 'Source Code Pro', monospace; }
  .catch-chips { display: flex; flex-wrap: wrap; gap: 5px; padding: 9px 14px; border-top: 1px solid var(--rule); }
  .chip { font-size: 10px; padding: 3px 9px; border-radius: 2px; background: var(--paper); color: var(--text-2); border: 1px solid var(--rule); letter-spacing: 0.3px; font-weight: 500; font-family: 'Source Code Pro', monospace; }
  .chip-tide { color: var(--slate); }
  .chip-spot { color: var(--moss); }
  .chip-obs  { color: var(--text-2); }

  /* Observation cards */
  .obs-card { background: var(--paper-2); border: 1px solid var(--rule); border-left: 3px solid var(--slate-light); border-radius: 3px; padding: 12px 14px; cursor: pointer; transition: all .15s; }
  .obs-card:hover { border-color: var(--rule-strong); border-left-color: var(--slate); }
  .obs-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .obs-species { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .obs-count { font-size: 12px; color: var(--text-2); font-weight: 600; font-family: 'Source Code Pro', monospace; }
  .obs-meta { font-size: 11px; color: var(--text-3); display: flex; gap: 10px; flex-wrap: wrap; font-family: 'Source Code Pro', monospace; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(20,24,29,.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: var(--paper); width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; border-radius: 8px 8px 0 0; padding-bottom: 28px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--rule); position: sticky; top: 0; background: var(--paper); z-index: 10; }
  .modal-title { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .modal-close { font-size: 22px; cursor: pointer; opacity: .5; background: none; border: none; color: var(--text); padding: 0 4px; }
  .modal-photos-strip { display: flex; gap: 1px; overflow-x: auto; }
  .modal-photo { width: 160px; height: 160px; object-fit: cover; flex-shrink: 0; }
  .modal-photos-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; }
  .modal-photo-2 { aspect-ratio: 1; object-fit: cover; width: 100%; }
  .modal-section { padding: 14px 20px; border-bottom: 1px solid var(--rule); }
  .modal-section-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; font-weight: 600; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--rule); }
  .modal-stat { background: var(--paper-2); padding: 11px 13px; }
  .modal-stat-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-3); font-weight: 600; }
  .modal-stat-value { font-size: 14px; color: var(--text); margin-top: 4px; font-weight: 600; font-family: 'Source Code Pro', monospace; }
  .modal-tide-bar { height: 5px; background: var(--rule); border-radius: 0; overflow:hidden; margin-top:10px; }
  .modal-tide-fill { height:100%; background: var(--slate); }
  .modal-notes { font-size: 14px; line-height: 1.7; color: var(--text-2); white-space: pre-wrap; }

  /* Spot groups in trip detail */
  .spot-group { margin-bottom: 18px; }
  .spot-group-header { display: flex; align-items: center; gap: 10px; padding: 9px 0 7px; border-bottom: 1px solid var(--ink); margin-bottom: 9px; }
  .spot-group-name { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .spot-group-meta { font-size: 11px; color: var(--text-3); font-family: 'Source Code Pro', monospace; }
  .spot-items { display: flex; flex-direction: column; gap: 6px; }
  .mini-catch { display: flex; align-items: center; gap: 10px; background: var(--paper-2); border: 1px solid var(--rule); border-radius: 3px; padding: 9px 12px; cursor: pointer; transition: border-color .15s; }
  .mini-catch:hover { border-color: var(--rule-strong); }
  .mini-catch-thumb { width: 34px; height: 34px; border-radius: 2px; object-fit: cover; background: var(--rule); display:flex;align-items:center;justify-content:center; font-size:0; flex-shrink:0; }
  .mini-catch-info { flex: 1; min-width: 0; }
  .mini-catch-species { font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
  .mini-catch-time { font-size: 10px; color: var(--text-3); font-family: 'Source Code Pro', monospace; }
  .mini-obs { display: flex; align-items: center; gap: 10px; background: var(--paper-2); border: 1px solid var(--rule); border-left: 3px solid var(--slate-light); border-radius: 3px; padding: 9px 12px; cursor: pointer; transition: border-color .15s; }
  .mini-obs:hover { border-color: var(--rule-strong); }

  .delete-btn { margin: 16px 20px 0; width: calc(100% - 40px); padding: 13px; background: transparent; border: 1px solid var(--rule-strong); color: var(--warn); font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: border-color .15s; font-weight: 600; }
  .delete-btn:hover { border-color: var(--warn); }
  .inline-edit { background: var(--paper-2); padding: 5px 9px; border-radius: 3px; border: 1px solid var(--rule); font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text); outline: none; width: 100%; }
  .field-select { flex: 1; border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text); background: transparent; -webkit-appearance: none; appearance: none; cursor: pointer; font-weight: 500; }
  .field-select-wrap { flex: 1; position: relative; display: flex; align-items: center; }
  .field-select-wrap::after { content: "▾"; position: absolute; right: 0; font-size: 10px; color: var(--text-3); pointer-events: none; }
  .line-type-badge { font-size: 9px; padding: 3px 9px; border-radius: 2px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; border: 1px solid; background: transparent; }
  .line-type-fly  { color: var(--slate); border-color: var(--slate); }
  .line-type-spin { color: var(--text-2); border-color: var(--text-2); }
  .method-derived { font-size: 11px; color: var(--text-3); }
  .info-note { font-size: 10px; color: var(--text-3); padding: 11px 14px; text-align: center; line-height: 1.5; border-top: 1px solid var(--rule); letter-spacing: 0.3px; }
  .context-pill { border-radius: 3px; padding: 9px 14px; font-size: 12px; letter-spacing: -0.005em; font-weight: 500; }
  .context-pill.water { background: var(--paper-2); border: 1px solid var(--rule); border-left: 3px solid var(--slate); color: var(--text-2); }
  .context-pill.copper { background: var(--paper-2); border: 1px solid var(--rule); border-left: 3px solid var(--slate-light); color: var(--text-2); }

  /* Export tab */
  .export-wrap { padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
  .export-card { background: var(--paper-2); border: 1px solid var(--rule); border-radius: 3px; overflow: hidden; }
  .export-card-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--rule); }
  .export-card-title { font-family: 'Inter', sans-serif; font-size: 16px; margin-bottom: 4px; font-weight: 600; letter-spacing: -0.01em; }
  .export-card-sub { font-size: 12px; color: var(--text-3); line-height: 1.5; }
  .export-card-stats { display: flex; gap: 16px; padding: 12px 16px; border-bottom: 1px solid var(--rule); flex-wrap: wrap; }
  .export-stat { display: flex; flex-direction: column; gap: 3px; }
  .export-stat-val { font-size: 22px; font-weight: 700; color: var(--text); font-family: 'Source Code Pro', monospace; }
  .export-stat-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); font-weight: 600; }
  .export-btn { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px;
    background: var(--ink); color: var(--paper); border: none; width: 100%; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; transition: background .15s; font-weight: 600; }
  .export-btn:hover { background: var(--slate-deep); }
  .export-btn:disabled { opacity: .4; cursor: not-allowed; }
  .export-columns { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 5px; }
  .export-col-chip { font-size: 10px; padding: 3px 8px; border-radius: 2px; background: var(--paper); color: var(--text-3); border: 1px solid var(--rule); font-family: 'Source Code Pro', monospace; }
  .export-instructions { background: var(--paper-2); border: 1px solid var(--rule); border-radius: 3px; padding: 16px; }
  .export-instructions-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; font-weight: 600; }
  .export-step { display: flex; gap: 12px; margin-bottom: 10px; font-size: 13px; color: var(--text-2); line-height: 1.6; }
  .export-step:last-child { margin-bottom: 0; }
  .export-step-num { width: 20px; height: 20px; border-radius: 2px; background: var(--ink); color: var(--paper); font-size: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; font-family: 'Source Code Pro', monospace; font-weight: 600; }

  /* Backup panel */
  .backup-panel { background: var(--ink); border-radius: 4px; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
  .backup-panel-title { font-family: 'Inter', sans-serif; font-size: 16px; color: var(--paper); display: flex; align-items: center; gap: 8px; font-weight: 700; letter-spacing: -0.01em; }

function getMoonPhase(d) {
  const phases = ["🌑 New", "🌒 Waxing Crescent", "🌓 First Quarter", "🌔 Waxing Gibbous", "🌕 Full", "🌖 Waning Gibbous", "🌗 Last Quarter", "🌘 Waning Crescent"];
  const diff = (d - new Date("2000-01-06")) / 86400000;
  return phases[Math.floor((diff % 29.53 + 29.53) % 29.53 / (29.53 / 8))];
}
const formatCoords = (lat, lon) => lat == null ? null : `${Math.abs(lat).toFixed(5)}°${lat >= 0 ? "N" : "S"}  ${Math.abs(lon).toFixed(5)}°${lon >= 0 ? "E" : "W"}`;
const fmtDT = iso => new Date(iso).toLocaleString("en-US", {
  month: "short",
  day: "numeric",
  year: "numeric",
  hour: "2-digit",
  minute: "2-digit"
});
const fmtTime = iso => new Date(iso).toLocaleTimeString("en-US", {
  hour: "2-digit",
  minute: "2-digit"
});
const fmtDateLong = d => d.toLocaleDateString("en-GB", {
  day: "numeric",
  month: "long",
  year: "numeric"
});
const durStr = (s, e) => {
  const m = Math.round((new Date(e) - new Date(s)) / 60000);
  return m < 60 ? `${m}m` : `${Math.floor(m / 60)}h ${m % 60}m`;
};
function toKartverketTime(d) {
  const p = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function normalizeTide(v, lat, hat) {
  const r = hat - lat;
  if (!r || r <= 0) return null;
  return Math.max(0, Math.min(1, (v - lat) / r));
}
function tideLabel(n) {
  if (n == null) return null;
  if (n > 1.0) return "Above MHWS";
  if (n >= 0.75) return "High";
  if (n >= 0.4) return "Mid";
  if (n >= 0.1) return "Low";
  if (n < 0) return "Below MLWS";
  return "Very Low";
}
function tideArrow(direction) {
  if (direction === "rising")  return " ↑";
  if (direction === "falling") return " ↓";
  return "";
}
function windCompass(deg) {
  if (deg == null) return "";
  const dirs = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
  return dirs[Math.round(deg / 22.5) % 16];
}
function tidePct(n) {
  if (n == null) return null;
  return Math.round(n * 100);
}
function parseKartverketXML(xml) {
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  // locationdata response — contains <waterlevel> elements
  const wl = doc.querySelectorAll("waterlevel");
  if (wl.length > 0) {
    const v = parseFloat(wl[0].getAttribute("value"));
    return { type: "level", valueCM: isNaN(v) ? null : v };
  }
  // locationlevels response — contains <reflevel> elements
  let mhws = null, mlws = null;
  doc.querySelectorAll("reflevel").forEach(el => {
    const code = (el.getAttribute("code") || "").toUpperCase();
    const v = parseFloat(el.getAttribute("value"));
    if (isNaN(v)) return;
    if (code === "MHW") mhws = v;
    if (code === "MLW") mlws = v;
  });
  if (mhws != null || mlws != null) return { type: "levels", mhws, mlws };
  return null;
}
const DATUM_CACHE = {};
async function fetchTideData(lat, lon, isoTs) {
  const BASE = "https://vannstand.kartverket.no/tideapi.php";
  // Try two CORS proxies in sequence
  const proxies = ["https://corsproxy.io/?", "https://api.allorigins.win/raw?url="];
  const proxyFetch = async url => {
    for (const proxy of proxies) {
      try {
        const r = await fetch(proxy + encodeURIComponent(url), {
          signal: AbortSignal.timeout(8000)
        });
        if (r.ok) {
          const t = await r.text();
          if (t.includes("<")) return t;
        }
      } catch (e) {
        continue;
      }
    }
    throw new Error("all proxies failed");
  };
  const ls = lat.toFixed(6),
    lo = lon.toFixed(6),
    ck = `${ls},${lo}`;
  const cd = new Date(isoTs),
    from = new Date(cd - 1800000),  // 30 min before
    to   = new Date(cd + 1800000);  // 30 min after
  let mhwsCM, mlwsCM;
  if (DATUM_CACHE[ck]) ({ mhwsCM, mlwsCM } = DATUM_CACHE[ck]);
  else {
    const datumUrl = `${BASE}?lat=${ls}&lon=${lo}&refcode=cd&lang=en&tide_request=locationlevels`;
    // Try up to 4 times — CORS proxies are unreliable for this call
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        const txt = await proxyFetch(datumUrl);
        const p = parseKartverketXML(txt);
        if (p?.type === "levels" && p.mhws != null && p.mlws != null) {
          mhwsCM = p.mhws;
          mlwsCM = p.mlws;
          DATUM_CACHE[ck] = { mhwsCM, mlwsCM };
          break;
        }
      } catch (e) {
        if (attempt === 3) console.warn("datum levels failed after 4 attempts", e);
      }
    }
  }
  const txt2 = await proxyFetch(`${BASE}?lat=${ls}&lon=${lo}&fromtime=${toKartverketTime(from)}&totime=${toKartverketTime(to)}&datatype=pre&refcode=cd&lang=en&interval=10&dst=0&tide_request=locationdata`);
  // Parse all waterlevel readings to derive direction
  const doc2 = new DOMParser().parseFromString(txt2, "text/xml");
  const wls = [...doc2.querySelectorAll("waterlevel")].map(el => ({
    t: new Date(el.getAttribute("time").replace("T", " ")),
    v: parseFloat(el.getAttribute("value"))
  })).filter(x => !isNaN(x.v) && !isNaN(x.t.getTime())).sort((a, b) => a.t - b.t);
  if (!wls.length) return null;
  // Find reading closest to catch time for the value
  const closest = wls.reduce((a, b) => Math.abs(a.t - cd) < Math.abs(b.t - cd) ? a : b);
  // Direction: compare first third vs last third of readings
  let direction = null;
  if (wls.length >= 3) {
    const third = Math.floor(wls.length / 3);
    const early = wls.slice(0, third).reduce((s, x) => s + x.v, 0) / third;
    const late  = wls.slice(-third).reduce((s, x) => s + x.v, 0) / third;
    direction = late > early ? "rising" : "falling";
  } else if (wls.length === 2) {
    direction = wls[1].v > wls[0].v ? "rising" : "falling";
  }
  const seasonal = mhwsCM != null && mlwsCM != null ? normalizeTide(closest.v, mlwsCM, mhwsCM) : null;
  return {
    valueCM: closest.v,
    seasonal,
    direction,
    mhwsCM,
    mlwsCM
  };
}

// ── GPS / env hook ────────────────────────────────────────────────────────────

function useEnv() {
  const [gps, setGps] = useState(null);
  const [gpsStatus, setGpsStatus] = useState("idle");
  const [weather, setWeather] = useState(null);
  const [weatherStatus, setWeatherStatus] = useState("idle");
  const [tide, setTide] = useState(null);
  const [tideStatus, setTideStatus] = useState("idle");
  const fetchEnv = useCallback(async (la, lo, ts) => {
    setWeatherStatus("loading");
    try {
      // Fetch current conditions + last 3 hours of pressure for trend
      const [rCurrent, rHistory] = await Promise.all([
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&current=temperature_2m,surface_pressure,wind_speed_10m,wind_direction_10m&timezone=auto&forecast_days=1`),
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&hourly=surface_pressure&timezone=auto&past_hours=3&forecast_days=0`)
      ]);
      const d = await rCurrent.json();
      const dh = await rHistory.json();
      const pressure = d.current?.surface_pressure != null ? Math.round(d.current.surface_pressure * 10) / 10 : null;
      // Get pressure 3 hours ago from hourly data (first entry)
      let pressureTrend = null;
      let pressureLabel = null;
      if (pressure != null && dh.hourly?.surface_pressure?.length >= 2) {
        const oldPressure = dh.hourly.surface_pressure[0];
        const diff = pressure - oldPressure;
        const absDiff = Math.abs(diff);
        const dir = diff > 0.5 ? "rising" : diff < -0.5 ? "falling" : "steady";
        const speed = absDiff >= 3 ? "rapidly" : absDiff >= 1 ? "slowly" : "";
        pressureTrend = dir;
        pressureLabel = dir === "steady" ? "Steady" : speed ? `${speed.charAt(0).toUpperCase() + speed.slice(1)} ${dir}` : dir.charAt(0).toUpperCase() + dir.slice(1);
      }
      // Pressure absolute label
      const pressureLevel = pressure == null ? null :
        pressure >= 1025 ? "Very High" :
        pressure >= 1015 ? "High" :
        pressure >= 1005 ? "Normal" :
        pressure >= 995  ? "Low" : "Very Low";
      setWeather({
        airTemp: d.current?.temperature_2m != null ? Math.round(d.current.temperature_2m * 10) / 10 : null,
        pressure,
        pressureLevel,
        pressureTrend,
        pressureLabel,
        windSpeed: d.current?.wind_speed_10m != null ? Math.round(d.current.wind_speed_10m * 10) / 10 : null,
        windDir: d.current?.wind_direction_10m != null ? Math.round(d.current.wind_direction_10m) : null,
        moon: getMoonPhase(new Date())
      });
      setWeatherStatus("ok");
    } catch {
      setWeatherStatus("error");
    }
    setTideStatus("loading");
    try {
      const res = await fetchTideData(la, lo, ts);
      if (res) {
        setTide(res);
        setTideStatus("ok");
      } else setTideStatus("unavailable");
    } catch (e) {
      console.warn("tide", e);
      setTideStatus("error");
    }
  }, []);
  const getGPS = useCallback(ts => {
    setGpsStatus("loading");
    navigator.geolocation.getCurrentPosition(pos => {
      const {
        latitude: la,
        longitude: lo
      } = pos.coords;
      setGps({
        lat: la,
        lon: lo
      });
      setGpsStatus("ok");
      fetchEnv(la, lo, ts);
    }, () => setGpsStatus("error"), {
      enableHighAccuracy: true,
      timeout: 15000
    });
  }, [fetchEnv]);
  const reset = () => {
    setGps(null);
    setGpsStatus("idle");
    setWeather(null);
    setWeatherStatus("idle");
    setTide(null);
    setTideStatus("idle");
  };
  return {
    gps,
    gpsStatus,
    weather,
    weatherStatus,
    tide,
    tideStatus,
    getGPS,
    reset
  };
}

const FLY_LINES = ["Float", "Slow Int", "Fast Int", "Sink3", "Sink5", "Sink7"];
const SPIN_LINES = ["Wobbler", "Shad", "Sandeel", "Softjerk"];
const ALL_LINES = [...FLY_LINES, ...SPIN_LINES];
const TEMP_OPTIONS = Array.from({
  length: 19
}, (_, i) => `${i + 7} °C`); // 7–25 °C
const TARGET_SPECIES = ["Salmon", "Sea Trout", "Sea Bass", "Garfish", "Mackerel", "Mullet"];
function deriveMethod(tripSpots) {
  const lines = tripSpots.map(s => s.lineType).filter(Boolean);
  if (!lines.length) return null;
  const hasFly = lines.some(l => FLY_LINES.includes(l));
  const hasSpin = lines.some(l => SPIN_LINES.includes(l));
  if (hasFly && hasSpin) return "Fly & Spin";
  if (hasFly) return "Fly";
  if (hasSpin) return "Spin";
  return null;
}
