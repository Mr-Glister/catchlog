  <!-- Firebase cloud sync -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCYedlMhYZTuU4RuVwhHEM4y7OINwMykho",
      authDomain: "catchlog-8bc3b.firebaseapp.com",
      projectId: "catchlog-8bc3b",
      storageBucket: "catchlog-8bc3b.firebasestorage.app",
      messagingSenderId: "288406766723",
      appId: "1:288406766723:web:0798dd9b11a13f44ff47b6"
    });
    var fbAuth = firebase.auth();
    var fbDb   = firebase.firestore();

    function cloudDoc(uid) {
      return fbDb.doc('users/' + uid + '/catchlog/data');
    }
    function cloudPull(uid) {
      return cloudDoc(uid).get().then(function(snap) {
        return snap.exists ? snap.data() : null;
      });
    }
    function cloudPush(uid) {
      return cloudDoc(uid).set({
        trips:        JSON.parse(localStorage.getItem('fl_trips_v3')  || '[]'),
        spots:        JSON.parse(localStorage.getItem('fl_spots_v2')  || '[]'),
        catches:      JSON.parse(localStorage.getItem('fl_catches_v3')|| '[]'),
        observations: JSON.parse(localStorage.getItem('fl_obs_v2')    || '[]'),
        lastUpdated:  Date.now()
      });
    }
    var _cloudLoading = false;
    var _cloudSyncTimer = null;
    var _onCloudSync = null;
    function cloudSchedulePush() {
      if (_cloudLoading) return;
      var user = fbAuth.currentUser;
      if (!user) return;
      clearTimeout(_cloudSyncTimer);
      _cloudSyncTimer = setTimeout(function() {
        if (_onCloudSync) _onCloudSync('loading', null);
        cloudPush(user.uid).then(function() {
          if (_onCloudSync) _onCloudSync('synced', new Date());
        }).catch(function(e) {
          console.error('Cloud sync error:', e);
          if (_onCloudSync) _onCloudSync('error', null);
        });
      }, 2000);
    }
    function cloudSignIn() {
      return fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }
    function cloudSignOut() {
      return fbAuth.signOut();
    }
    // Intercept all localStorage writes to CatchLog keys → schedule auto-push
    // Also stamp cl_lastUpdated so we can compare against cloud on sign-in
    var _origLocalStorageSet;
    (function() {
      var KEYS = ['fl_trips_v3', 'fl_spots_v2', 'fl_catches_v3', 'fl_obs_v2'];
      _origLocalStorageSet = localStorage.setItem.bind(localStorage);
      localStorage.setItem = function(key, value) {
        _origLocalStorageSet(key, value);
        if (KEYS.indexOf(key) !== -1 && !_cloudLoading) {
          _origLocalStorageSet('cl_lastUpdated', String(Date.now()));
          cloudSchedulePush();
        }
      };
    })();
  </script>

  <script>

// ── Utilities ─────────────────────────────────────────────────────────────────

function getMoonPhase(d) {
  const phases = ["🌑 New", "🌒 Waxing Crescent", "🌓 First Quarter", "🌔 Waxing Gibbous", "🌕 Full", "🌖 Waning Gibbous", "🌗 Last Quarter", "🌘 Waning Crescent"];
  const diff = (d - new Date("2000-01-06")) / 86400000;
  return phases[Math.floor((diff % 29.53 + 29.53) % 29.53 / (29.53 / 8))];
}
const formatCoords = (lat, lon) => lat == null ? null : `${Math.abs(lat).toFixed(5)}°${lat >= 0 ? "N" : "S"}  ${Math.abs(lon).toFixed(5)}°${lon >= 0 ? "E" : "W"}`;
const fmtDT = iso => new Date(iso).toLocaleString("en-US", {
  month: "short",
  day: "numeric",
  year: "numeric",
  hour: "2-digit",
  minute: "2-digit"
});
const fmtTime = iso => new Date(iso).toLocaleTimeString("en-GB", {
  hour: "2-digit",
  minute: "2-digit"
});
const fmtDateLong = d => d.toLocaleDateString("en-GB", {
  day: "numeric",
  month: "long",
  year: "numeric"
});
const durStr = (s, e) => {
  const m = Math.round((new Date(e) - new Date(s)) / 60000);
  return m < 60 ? `${m}m` : `${Math.floor(m / 60)}h ${m % 60}m`;
};
function toKartverketTime(d) {
  const p = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function normalizeTide(v, lat, hat) {
  const r = hat - lat;
  if (!r || r <= 0) return null;
  return Math.max(0, Math.min(1, (v - lat) / r));
}
function tideLabel(n) {
  if (n == null) return null;
  if (n > 1.0) return "Above MHWS";
  if (n >= 0.75) return "High";
  if (n >= 0.4) return "Mid";
  if (n >= 0.1) return "Low";
  if (n < 0) return "Below MLWS";
  return "Very Low";
}
function tideArrow(direction) {
  if (direction === "rising")  return " ↑";
  if (direction === "falling") return " ↓";
  return "";
}
function windCompass(deg) {
  if (deg == null) return "";
  const dirs = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
  return dirs[Math.round(deg / 22.5) % 16];
}
function tidePct(n) {
  if (n == null) return null;
  return Math.round(n * 100);
}
function parseKartverketXML(xml) {
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  // locationdata response — contains <waterlevel> elements
  const wl = doc.querySelectorAll("waterlevel");
  if (wl.length > 0) {
    const v = parseFloat(wl[0].getAttribute("value"));
    return { type: "level", valueCM: isNaN(v) ? null : v };
  }
  // locationlevels response — contains <reflevel> elements
  let mhws = null, mlws = null;
  doc.querySelectorAll("reflevel").forEach(el => {
    const code = (el.getAttribute("code") || "").toUpperCase();
    const v = parseFloat(el.getAttribute("value"));
    if (isNaN(v)) return;
    if (code === "MHW") mhws = v;
    if (code === "MLW") mlws = v;
  });
  if (mhws != null || mlws != null) return { type: "levels", mhws, mlws };
  return null;
}
const DATUM_CACHE = {};
async function fetchTideData(lat, lon, isoTs) {
  const BASE = "https://vannstand.kartverket.no/tideapi.php";
  // Try two CORS proxies in sequence
  const proxies = ["https://corsproxy.io/?", "https://api.allorigins.win/raw?url="];
  const proxyFetch = async url => {
    for (const proxy of proxies) {
      try {
        const ac = new AbortController();
        const timer = setTimeout(() => ac.abort(), 8000);
        let r;
        try {
          r = await fetch(proxy + encodeURIComponent(url), { signal: ac.signal });
        } finally {
          clearTimeout(timer);
        }
        if (r.ok) {
          const t = await r.text();
          if (t.includes("<")) return t;
        }
      } catch (e) {
        continue;
      }
    }
    throw new Error("all proxies failed");
  };
  const ls = lat.toFixed(6),
    lo = lon.toFixed(6),
    ck = `${ls},${lo}`;
  const cd = new Date(isoTs),
    from = new Date(cd - 1800000),  // 30 min before
    to   = new Date(cd + 1800000);  // 30 min after
  let mhwsCM, mlwsCM;
  if (DATUM_CACHE[ck]) ({ mhwsCM, mlwsCM } = DATUM_CACHE[ck]);
  else {
    const datumUrl = `${BASE}?lat=${ls}&lon=${lo}&refcode=cd&lang=en&tide_request=locationlevels`;
    // Try up to 4 times — CORS proxies are unreliable for this call
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        const txt = await proxyFetch(datumUrl);
        const p = parseKartverketXML(txt);
        if (p?.type === "levels" && p.mhws != null && p.mlws != null) {
          mhwsCM = p.mhws;
          mlwsCM = p.mlws;
          DATUM_CACHE[ck] = { mhwsCM, mlwsCM };
          break;
        }
      } catch (e) {
        if (attempt === 3) console.warn("datum levels failed after 4 attempts", e);
      }
    }
  }
  const txt2 = await proxyFetch(`${BASE}?lat=${ls}&lon=${lo}&fromtime=${toKartverketTime(from)}&totime=${toKartverketTime(to)}&datatype=pre&refcode=cd&lang=en&interval=10&dst=0&tide_request=locationdata`);
  // Parse all waterlevel readings to derive direction
  const doc2 = new DOMParser().parseFromString(txt2, "text/xml");
  const wls = [...doc2.querySelectorAll("waterlevel")].map(el => ({
    t: new Date(el.getAttribute("time").replace("T", " ")),
    v: parseFloat(el.getAttribute("value"))
  })).filter(x => !isNaN(x.v) && !isNaN(x.t.getTime())).sort((a, b) => a.t - b.t);
  if (!wls.length) return null;
  // Find reading closest to catch time for the value
  const closest = wls.reduce((a, b) => Math.abs(a.t - cd) < Math.abs(b.t - cd) ? a : b);
  // Direction: compare first third vs last third of readings
  let direction = null;
  if (wls.length >= 3) {
    const third = Math.floor(wls.length / 3);
    const early = wls.slice(0, third).reduce((s, x) => s + x.v, 0) / third;
    const late  = wls.slice(-third).reduce((s, x) => s + x.v, 0) / third;
    direction = late > early ? "rising" : "falling";
  } else if (wls.length === 2) {
    direction = wls[1].v > wls[0].v ? "rising" : "falling";
  }
  const seasonal = mhwsCM != null && mlwsCM != null ? normalizeTide(closest.v, mlwsCM, mhwsCM) : null;

  // ── Next HW / LW via datatype=tab (next 14 hours) ──
  let nextHigh = null, nextLow = null;
  try {
    const tabFrom = new Date(cd);
    const tabTo   = new Date(cd.getTime() + 14 * 3600000);
    const txtTab = await proxyFetch(`${BASE}?lat=${ls}&lon=${lo}&fromtime=${toKartverketTime(tabFrom)}&totime=${toKartverketTime(tabTo)}&datatype=tab&refcode=cd&lang=en&dst=0&tide_request=locationdata`);
    const docTab = new DOMParser().parseFromString(txtTab, "text/xml");
    const tabEls = [...docTab.querySelectorAll("waterlevel")].map(el => ({
      t: new Date(el.getAttribute("time").replace("T", " ")),
      v: parseFloat(el.getAttribute("value")),
      flag: (el.getAttribute("flag") || "").toUpperCase()
    })).filter(x => !isNaN(x.v) && !isNaN(x.t.getTime()) && x.t > cd);
    nextHigh = tabEls.find(x => x.flag === "HIGH") || null;
    nextLow  = tabEls.find(x => x.flag === "LOW") || null;
  } catch (e) {
    console.warn("tide tab fetch failed", e);
  }

  return {
    valueCM: closest.v,
    seasonal,
    direction,
    mhwsCM,
    mlwsCM,
    nextHigh,
    nextLow
  };
}

// ── GPS / env hook ────────────────────────────────────────────────────────────

function useEnv() {
  const [gps, setGps] = useState(null);
  const [gpsStatus, setGpsStatus] = useState("idle");
  const [weather, setWeather] = useState(null);
  const [weatherStatus, setWeatherStatus] = useState("idle");
  const [tide, setTide] = useState(null);
  const [tideStatus, setTideStatus] = useState("idle");
  const fetchEnv = useCallback(async (la, lo, ts) => {
    setWeatherStatus("loading");
    try {
      // Fetch current conditions + last 12 hours of pressure for trend + sparkline
      const [rCurrent, rHistory] = await Promise.all([
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&current=temperature_2m,surface_pressure,wind_speed_10m,wind_direction_10m&wind_speed_unit=ms&timezone=auto&forecast_days=1`),
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&hourly=surface_pressure&timezone=auto&past_hours=12&forecast_days=0`)
      ]);
      const d = await rCurrent.json();
      const dh = await rHistory.json();
      const pressure = d.current?.surface_pressure != null ? Math.round(d.current.surface_pressure * 10) / 10 : null;
      // Build hourly pressure history for sparkline (last 12 values before current hour)
      let pressureHistory = null;
      if (dh.hourly?.surface_pressure?.length >= 2) {
        pressureHistory = dh.hourly.surface_pressure
          .filter(v => v != null)
          .map(v => Math.round(v * 10) / 10);
      }
      // Trend: compare oldest available hour vs current pressure
      let pressureTrend = null;
      let pressureLabel = null;
      if (pressure != null && pressureHistory && pressureHistory.length >= 2) {
        const oldPressure = pressureHistory[0];
        const diff = pressure - oldPressure;
        const absDiff = Math.abs(diff);
        const dir = diff > 0.5 ? "rising" : diff < -0.5 ? "falling" : "steady";
        const speed = absDiff >= 3 ? "rapidly" : absDiff >= 1 ? "slowly" : "";
        pressureTrend = dir;
        pressureLabel = dir === "steady" ? "Steady" : speed ? `${speed.charAt(0).toUpperCase() + speed.slice(1)} ${dir}` : dir.charAt(0).toUpperCase() + dir.slice(1);
      }
      // Pressure absolute label
      const pressureLevel = pressure == null ? null :
        pressure >= 1025 ? "Very High" :
        pressure >= 1015 ? "High" :
        pressure >= 1005 ? "Normal" :
        pressure >= 995  ? "Low" : "Very Low";
      setWeather({
        airTemp: d.current?.temperature_2m != null ? Math.round(d.current.temperature_2m * 10) / 10 : null,
        pressure,
        pressureLevel,
        pressureTrend,
        pressureLabel,
        pressureHistory,
        windSpeed: d.current?.wind_speed_10m != null ? Math.round(d.current.wind_speed_10m * 10) / 10 : null,
        windDir: d.current?.wind_direction_10m != null ? Math.round(d.current.wind_direction_10m) : null,
        moon: getMoonPhase(new Date())
      });
      setWeatherStatus("ok");
    } catch {
      setWeatherStatus("error");
    }
    setTideStatus("loading");
    try {
      const res = await fetchTideData(la, lo, ts);
      if (res) {
        setTide(res);
        setTideStatus("ok");
      } else setTideStatus("unavailable");
    } catch (e) {
      console.warn("tide", e);
      setTideStatus("error");
    }
  }, []);
  const getGPS = useCallback(ts => {
    setGpsStatus("loading");
    navigator.geolocation.getCurrentPosition(pos => {
      const {
        latitude: la,
        longitude: lo
      } = pos.coords;
      setGps({
        lat: la,
        lon: lo
      });
      setGpsStatus("ok");
      fetchEnv(la, lo, ts);
    }, () => setGpsStatus("error"), {
      enableHighAccuracy: true,
      timeout: 15000
    });
  }, [fetchEnv]);
  const reset = () => {
    setGps(null);
    setGpsStatus("idle");
    setWeather(null);
    setWeatherStatus("idle");
    setTide(null);
    setTideStatus("idle");
  };
  return {
    gps,
    gpsStatus,
    weather,
    weatherStatus,
    tide,
    tideStatus,
    getGPS,
    reset
  };
}

const esc = v => {
