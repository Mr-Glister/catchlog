// ── Utilities ─────────────────────────────────────────────────────────────────

function getMoonPhase(d) {
  const phases=["🌑 New","🌒 Waxing Crescent","🌓 First Quarter","🌔 Waxing Gibbous","🌕 Full","🌖 Waning Gibbous","🌗 Last Quarter","🌘 Waning Crescent"];
  const diff=(d-new Date("2000-01-06"))/86400000;
  return phases[Math.floor(((diff%29.53)+29.53)%29.53/(29.53/8))];
}
const formatCoords=(lat,lon)=>lat==null?null:`${Math.abs(lat).toFixed(5)}°${lat>=0?"N":"S"}  ${Math.abs(lon).toFixed(5)}°${lon>=0?"E":"W"}`;
const fmtDT =iso=>new Date(iso).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"});
const fmtTime=iso=>new Date(iso).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
const fmtDateLong=d=>d.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
const durStr=(s,e)=>{const m=Math.round((new Date(e)-new Date(s))/60000);return m<60?`${m}m`:`${Math.floor(m/60)}h ${m%60}m`;};

function toKartverketTime(d){const p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;}
function normalizeTide(v,lat,hat){const r=hat-lat;if(!r||r<=0)return null;return Math.max(0,Math.min(1,(v-lat)/r));}
function tideLabel(n){if(n==null)return null;if(n>=.88)return"Near HAT";if(n>=.65)return"High";if(n>=.35)return"Mid";if(n>=.12)return"Low";return"Near LAT";}
function parseKartverketXML(xml){
  const doc=new DOMParser().parseFromString(xml,"text/xml");
  const wl=doc.querySelectorAll("waterlevel");
  if(wl.length>0){const v=parseFloat(wl[0].getAttribute("value"));return{type:"level",valueCM:isNaN(v)?null:v};}
  let hat=null,lat=null;
  doc.querySelectorAll("level").forEach(el=>{
    const code=(el.getAttribute("code")||el.getAttribute("shortenglish")||el.getAttribute("fullname")||"").toUpperCase();
    const v=parseFloat(el.getAttribute("value"));if(isNaN(v))return;
    if(code==="HAT"||code.includes("HIGHEST ASTRO"))hat=v;
    if(code==="LAT"||code.includes("LOWEST ASTRO"))lat=v;
  });
  if(hat!=null||lat!=null)return{type:"levels",hat,lat};
  return null;
}
const DATUM_CACHE={};
async function fetchTideData(lat,lon,isoTs){
  const BASE="https://vannstand.kartverket.no/tideapi.php";
  // Try two CORS proxies in sequence
  const proxies=["https://corsproxy.io/?","https://api.allorigins.win/raw?url="];
  const proxyFetch=async(url)=>{
    for(const proxy of proxies){
      try{
        const r=await fetch(proxy+encodeURIComponent(url),{signal:AbortSignal.timeout(8000)});
        if(r.ok){const t=await r.text();if(t.includes("<"))return t;}
      }catch(e){continue;}
    }
    throw new Error("all proxies failed");
  };
  const ls=lat.toFixed(6),lo=lon.toFixed(6),ck=`${ls},${lo}`;
  const cd=new Date(isoTs),from=new Date(cd-600000),to=new Date(cd+600000);
  let hatCM,latCM;
  if(DATUM_CACHE[ck])({hatCM,latCM}=DATUM_CACHE[ck]);
  else{
    const txt=await proxyFetch(`${BASE}?lat=${ls}&lon=${lo}&refcode=cd&lang=en&tide_request=locationlevels`);
    const p=parseKartverketXML(txt);
    if(p?.type==="levels"){hatCM=p.hat;latCM=p.lat;DATUM_CACHE[ck]={hatCM,latCM};}
  }
  const txt2=await proxyFetch(`${BASE}?lat=${ls}&lon=${lo}&fromtime=${toKartverketTime(from)}&totime=${toKartverketTime(to)}&datatype=pre&refcode=cd&lang=en&interval=10&dst=0&tide_request=locationdata`);
  const p2=parseKartverketXML(txt2);
  if(!p2||p2.valueCM==null)return null;
  return{valueCM:p2.valueCM,normalized:hatCM!=null&&latCM!=null?normalizeTide(p2.valueCM,latCM,hatCM):null,hatCM,latCM};
}

function useEnv(){
  const [gps,setGps]=useState(null);
  const [gpsStatus,setGpsStatus]=useState("idle");
  const [weather,setWeather]=useState(null);
  const [weatherStatus,setWeatherStatus]=useState("idle");
  const [tide,setTide]=useState(null);
  const [tideStatus,setTideStatus]=useState("idle");

  const fetchEnv=useCallback(async(la,lo,ts)=>{
    setWeatherStatus("loading");
    try{
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&current=temperature_2m,surface_pressure&timezone=auto&forecast_days=1`);
      const d=await r.json();
      setWeather({airTemp:d.current?.temperature_2m!=null?Math.round(d.current.temperature_2m*10)/10:null,pressure:d.current?.surface_pressure!=null?Math.round(d.current.surface_pressure):null,moon:getMoonPhase(new Date())});
      setWeatherStatus("ok");
    }catch{setWeatherStatus("error");}
    setTideStatus("loading");
    try{const res=await fetchTideData(la,lo,ts);if(res){setTide(res);setTideStatus("ok");}else setTideStatus("unavailable");}
    catch(e){console.warn("tide",e);setTideStatus("error");}
  },[]);

  const getGPS=useCallback((ts)=>{
    setGpsStatus("loading");
    navigator.geolocation.getCurrentPosition(
      pos=>{const{latitude:la,longitude:lo}=pos.coords;setGps({lat:la,lon:lo});setGpsStatus("ok");fetchEnv(la,lo,ts);},
      ()=>setGpsStatus("error"),{enableHighAccuracy:true,timeout:15000}
    );
  },[fetchEnv]);

  const reset=()=>{setGps(null);setGpsStatus("idle");setWeather(null);setWeatherStatus("idle");setTide(null);setTideStatus("idle");};
  return{gps,gpsStatus,weather,weatherStatus,tide,tideStatus,getGPS,reset};
}

// ── CSV helpers ───────────────────────────────────────────────────────────────

const esc=v=>{if(v==null)return"";const s=String(v);return(s.includes(",")||s.includes('"')||s.includes("\n"))?`"${s.replace(/"/g,'""')}"`:s;};
const row=cells=>cells.map(esc).join(",");

const tripsCSV=(trips,spots,catches,obs)=>{
  const h=row(["trip_id","name","start_time","end_time","duration_min","target_species","method","spot_count","catch_count","obs_count","notes"]);
  return[h,...trips.map(t=>{
    const ts=spots.filter(s=>s.tripId===t.id);
    const tc=catches.filter(c=>c.tripId===t.id);
    const to=obs.filter(o=>o.tripId===t.id);
    const dur=t.endTime?Math.round((new Date(t.endTime)-new Date(t.startTime))/60000):"";
    const method=deriveMethod(ts)||"";
    return row([t.id,t.name,t.startTime,t.endTime||"",dur,t.targetSpecies||"",method,ts.length,tc.length,to.length,t.notes||""]);
  })].join("\n");
};
const spotsCSV=(spots,trips)=>{
  const h=row(["spot_id","trip_id","trip_name","name","timestamp","gps_lat","gps_lon","line_type","water_temp","notes"]);
  return[h,...spots.map(s=>{const t=trips.find(x=>x.id===s.tripId);return row([s.id,s.tripId,t?.name||"",s.name||"",s.timestamp,s.gps?.lat??"",s.gps?.lon??"",s.lineType||"",s.waterTemp||"",s.notes||""])})].join("\n");
};
const catchesCSV=(catches,spots,trips)=>{
  const h=row(["catch_id","trip_id","trip_name","spot_id","spot_name","timestamp","species","fly_pattern","size","gps_lat","gps_lon","water_temp","air_temp_c","pressure_hpa","moon_phase","tide_normalized","tide_cm","tide_lat_cm","tide_hat_cm","notes"]);
  return[h,...[...catches].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).map(c=>{
    const t=trips.find(x=>x.id===c.tripId),s=spots.find(x=>x.id===c.spotId);
    return row([c.id,c.tripId||"",t?.name||"",c.spotId||"",s?.name||"",c.timestamp,c.species,c.flyPattern||"",c.size||"",c.gps?.lat??"",c.gps?.lon??"",c.waterTemp||"",c.weather?.airTemp??"",c.weather?.pressure??"",c.weather?.moon||"",c.tide?.normalized!=null?c.tide.normalized.toFixed(4):"",c.tide?.valueCM??"",c.tide?.latCM??"",c.tide?.hatCM??"",c.notes||""]);
  })].join("\n");
};
const obsCSV=(observations,spots,trips)=>{
  const h=row(["obs_id","trip_id","trip_name","spot_id","spot_name","timestamp","species","count","estimated_size","gps_lat","gps_lon","notes"]);
  return[h,...[...observations].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).map(o=>{
    const t=trips.find(x=>x.id===o.tripId),s=spots.find(x=>x.id===o.spotId);
    return row([o.id,o.tripId||"",t?.name||"",o.spotId||"",s?.name||"",o.timestamp,o.species,o.count||"",o.estimatedSize||"",o.gps?.lat??"",o.gps?.lon??"",o.notes||""]);
  })].join("\n");
};
function dlCSV(content,filename){
  const blob=new Blob(["\uFEFF"+content],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}

// ── Line types & method derivation ───────────────────────────────────────────

const FLY_LINES  = ["Float","Slow Int","Fast Int","Sink3","Sink5","Sink7"];
const SPIN_LINES = ["Wobbler","Shad","Softjerk"];
const ALL_LINES  = [...FLY_LINES, ...SPIN_LINES];

const TEMP_OPTIONS = Array.from({length:19},(_,i)=>`${i+7} °C`); // 7–25 °C
const TARGET_SPECIES = ["Sea Trout","Sea Bass"];

function deriveMethod(tripSpots) {
  const lines = tripSpots.map(s => s.lineType).filter(Boolean);
  if (!lines.length) return null;
  const hasFly  = lines.some(l => FLY_LINES.includes(l));
  const hasSpin = lines.some(l => SPIN_LINES.includes(l));
  if (hasFly && hasSpin) return "Fly & Spin";
  if (hasFly)  return "Fly";
  if (hasSpin) return "Spin";
  return null;
}



const SK={trips:"fl_trips_v3",spots:"fl_spots_v2",catches:"fl_catches_v3",obs:"fl_obs_v2"};
const load=k=>{try{return JSON.parse(localStorage.getItem(k)||"[]");}catch{return[];}};
const persist=(k,d)=>localStorage.setItem(k,JSON.stringify(d));

function FishLog(){
  const [tab,setTab]=useState("trips");
  const [logMode,setLogMode]=useState("catch"); // lifted so banner can control it
  const [trips,setTrips]=useState(()=>load(SK.trips));
  const [spots,setSpots]=useState(()=>load(SK.spots));
  const [catches,setCatches]=useState(()=>load(SK.catches));
  const [observations,setObservations]=useState(()=>load(SK.obs));
  const [selTrip,setSelTrip]=useState(null);
  const [selCatch,setSelCatch]=useState(null);
  const [selObs,setSelObs]=useState(null);
  const [toast,setToast]=useState(null);
  const toastRef=useRef(null);

  const activeTrip=trips.find(t=>!t.endTime)||null;
  const activeSpot=activeTrip
    ?[...spots].filter(s=>s.tripId===activeTrip.id).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0]||null
    :null;

  const showToast=msg=>{setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(null),2800);};

  const mut=(setter,key)=>fn=>{setter(p=>{const u=fn(p);persist(key,u);return u;});};
  const mutTrips  =mut(setTrips,  SK.trips);
  const mutSpots  =mut(setSpots,  SK.spots);
  const mutCatches=mut(setCatches,SK.catches);
  const mutObs    =mut(setObservations,SK.obs);

  // Starting a session creates both a trip AND the first spot atomically
  const startSession=(spotData,tripMeta)=>{
    const now=new Date();
    const tripId=`t_${now.getTime()}`;
    const spotId=`s_${now.getTime()}`;
    const trip={id:tripId,name:fmtDateLong(now),startTime:now.toISOString(),endTime:null,...tripMeta};
    const spot={id:spotId,tripId,...spotData,timestamp:now.toISOString()};
    mutTrips(p=>[trip,...p]);
    mutSpots(p=>[spot,...p]);
    showToast(`Session started · ${spot.name||"New spot"}`);
  };

  const addSpot=s=>{mutSpots(p=>[s,...p]);showToast(`Spot "${s.name||"New spot"}" added`);};
  const endTrip=()=>{mutTrips(p=>p.map(t=>t.id===activeTrip.id?{...t,endTime:new Date().toISOString()}:t));showToast("Session ended");};
  const updTrip=t=>mutTrips(p=>p.map(x=>x.id===t.id?t:x));
  const delTrip=id=>{mutTrips(p=>p.filter(t=>t.id!==id));setSelTrip(null);showToast("Trip deleted");};
  const updSpot=s=>mutSpots(p=>p.map(x=>x.id===s.id?s:x));

  const addCatch=c=>{mutCatches(p=>[c,...p]);setTab("journal");showToast("Catch recorded ✓");};
  const delCatch=id=>{mutCatches(p=>p.filter(c=>c.id!==id));setSelCatch(null);showToast("Catch deleted");};
  const addObs  =o=>{mutObs(p=>[o,...p]);setTab("journal");showToast("Observation recorded 👁");};
  const delObs  =id=>{mutObs(p=>p.filter(o=>o.id!==id));setSelObs(null);showToast("Observation deleted");};

  const tripSpots  =t=>[...spots].filter(s=>s.tripId===t.id).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  const tripCatches=t=>catches.filter(c=>c.tripId===t.id);
  const tripObs    =t=>observations.filter(o=>o.tripId===t.id);

  return(
    <>
      <style>{css}</style>
      <div className="app">
        <header className="header">
          <div className="header-top">
            <div className="header-title">The <span>Catch</span> Log</div>
            <div className="header-sub">Norway</div>
          </div>
          <div className="tab-bar">
            <button className={`tab${tab==="trips"?" active":""}`}   onClick={()=>setTab("trips")}>🗓 Sessions</button>
            <button className={`tab${tab==="log"?" active":""}`}     onClick={()=>setTab("log")}>⊕ Log</button>
            <button className={`tab${tab==="journal"?" active":""}`} onClick={()=>setTab("journal")}>📋 Journal</button>
            <button className={`tab${tab==="export"?" active":""}`}  onClick={()=>setTab("export")}>↓ Export</button>
          </div>
        </header>

        {activeTrip&&(
          <div className="active-banner">
            <div className="ab-left">
              <div className="ab-trip">{activeTrip.name}</div>
              <div className="ab-spot">{activeSpot?`📍 ${activeSpot.name||"Unnamed spot"}`:"📍 No spot yet"}</div>
              {activeSpot?.waterTemp&&<div className="ab-meta">💧 {activeSpot.waterTemp}</div>}
            </div>
            <div className="ab-buttons">
              <button className="ab-btn" onClick={()=>{setLogMode("spot");setTab("log");}}>+ New Spot</button>
              <button className="ab-btn end" onClick={endTrip}>End</button>
            </div>
          </div>
        )}

        {tab==="trips"  &&<TripsList trips={trips} tripSpots={tripSpots} tripCatches={tripCatches} tripObs={tripObs} activeTrip={activeTrip} onSelect={setSelTrip} onStartSession={startSession}/>}
        {tab==="log"    &&<LogTab activeTrip={activeTrip} activeSpot={activeSpot} onAddSpot={addSpot} onAddCatch={addCatch} onAddObs={addObs} logMode={logMode} setLogMode={setLogMode}/>}
        {tab==="journal"&&<Journal catches={catches} observations={observations} spots={spots} trips={trips} onSelCatch={setSelCatch} onSelObs={setSelObs}/>}
        {tab==="export" &&<ExportTab trips={trips} spots={spots} catches={catches} observations={observations}/>}

        {selTrip &&<TripDetail  trip={selTrip}  onClose={()=>setSelTrip(null)}  onDelete={delTrip}  onUpdate={updTrip}  spots={tripSpots(selTrip)} catches={tripCatches(selTrip)} observations={tripObs(selTrip)} onSelCatch={c=>{setSelTrip(null);setSelCatch(c);}} onSelObs={o=>{setSelTrip(null);setSelObs(o);}} onUpdSpot={updSpot}/>}
        {selCatch&&<CatchDetail catch={selCatch} onClose={()=>setSelCatch(null)} onDelete={delCatch} trips={trips} spots={spots}/>}
        {selObs  &&<ObsDetail  obs={selObs}     onClose={()=>setSelObs(null)}   onDelete={delObs}   trips={trips} spots={spots}/>}
        {toast&&<div className="toast">{toast}</div>}
      </div>
    </>
  );
}

  );
}

// ── Catch form ────────────────────────────────────────────────────────────────

function CatchForm({activeTrip,activeSpot,onSave}){
  const [fishPhoto,setFishPhoto]=useState(null);
  const [flyPhoto,setFlyPhoto]=useState(null);
  const [species,setSpecies]=useState("");
  const [flyPattern,setFlyPattern]=useState("");
  const [size,setSize]=useState("");
  const [waterTemp,setWaterTemp]=useState("");
  const [notes,setNotes]=useState("");
  const [timestamp]=useState(()=>new Date().toISOString());
  const {gps,gpsStatus,weather,weatherStatus,tide,tideStatus,getGPS,reset}=useEnv();
  const fishRef=useRef(),flyRef=useRef();
  // Compress photo to max 800px wide, JPEG quality 0.7 — keeps localStorage usage low
  const hp=s=>e=>{
    const f=e.target.files[0];if(!f)return;
    const img=new Image();
    const url=URL.createObjectURL(f);
    img.onload=()=>{
      const MAX=800;
      const scale=Math.min(1,MAX/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      s(canvas.toDataURL("image/jpeg",0.7));
      URL.revokeObjectURL(url);
    };
    img.src=url;
  };

  const handleSave=()=>{
    if(!species.trim())return;
    onSave({id:`c_${Date.now()}`,timestamp,species:species.trim(),flyPattern:flyPattern.trim(),size:size.trim(),waterTemp:waterTemp.trim(),notes:notes.trim(),fishPhoto,flyPhoto,gps,weather,tide,tripId:activeTrip?.id||null,spotId:activeSpot?.id||null});
    setFishPhoto(null);setFlyPhoto(null);setSpecies("");setFlyPattern("");setSize("");setWaterTemp("");setNotes("");reset();
  };

  return(
    <>
      {activeSpot&&<div className="context-pill water">📍 Logging to: <strong>{activeSpot.name||"Active spot"}</strong>{activeSpot.waterTemp?` · 💧 ${activeSpot.waterTemp}`:""}</div>}

      <div className="photo-grid photo-grid-2">
        {[{ref:fishRef,photo:fishPhoto,setter:setFishPhoto,label:"Fish"},{ref:flyRef,photo:flyPhoto,setter:setFlyPhoto,label:"Fly"}].map(({ref,photo,setter,label})=>(
          <div key={label} className="photo-slot" onClick={()=>ref.current.click()}>
            {photo?<img src={photo} alt={label}/>:<><div className="photo-slot-icon">📷</div><div className="photo-slot-label">{label}</div></>}
            <input ref={ref} type="file" accept="image/*" capture="environment" onChange={hp(setter)}/>
          </div>
        ))}
      </div>

      <div className="field-group">
        <div className="field-group-title">Catch Details</div>
        {[{icon:"🐟",label:"Species",val:species,set:setSpecies,ph:"Brown Trout…"},
          {icon:"🪰",label:"Fly Pattern",val:flyPattern,set:setFlyPattern,ph:"Elk Hair Caddis #14…"},
          {icon:"📏",label:"Size",val:size,set:setSize,ph:"42 cm / 16 in"}].map(f=>(
          <div key={f.label} className="field-row"><span className="field-icon">{f.icon}</span><span className="field-label">{f.label}</span><input className="field-input" value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.ph}/></div>
        ))}
      </div>

      <div className="field-group">
        <div className="field-group-title">Location & Time</div>
        <div className="field-row"><span className="field-icon">🕐</span><span className="field-label">Time</span><span className="field-value" style={{fontSize:12}}>{fmtDT(timestamp)}</span></div>
        <div className="field-row">
          <span className="field-icon">📍</span><span className="field-label">GPS</span>
          {gpsStatus==="idle"   &&<button className="gps-btn" onClick={()=>getGPS(timestamp)}>Get Fix</button>}
          {gpsStatus==="loading"&&<span className="status-badge status-loading">Acquiring…</span>}
          {gpsStatus==="error"  &&<><span className="status-badge status-error">Failed</span><button className="gps-btn" style={{marginLeft:6}} onClick={()=>getGPS(timestamp)}>Retry</button></>}
          {gpsStatus==="ok"&&gps&&<span className="gps-coords">{formatCoords(gps.lat,gps.lon)}</span>}
        </div>
      </div>

      <div className="field-group">
        <div className="field-group-title">Conditions{(weatherStatus==="loading"||tideStatus==="loading")&&<span style={{opacity:.5,fontSize:9}}> · fetching…</span>}</div>
        <div className="field-row"><span className="field-icon">🌡️</span><span className="field-label">Air Temp</span>{weather?.airTemp!=null?<span className="field-value">{weather.airTemp} °C</span>:<input className="field-input" placeholder="e.g. 12 °C"/>}</div>
        <div className="field-row">
          <span className="field-icon">💧</span><span className="field-label">Water Temp</span>
          <TempSelect value={waterTemp} onChange={setWaterTemp} placeholder={activeSpot?.waterTemp?`Spot: ${activeSpot.waterTemp}`:"— select —"}/>
          <span className="field-unit">manual</span>
        </div>
        <div className="field-row top">
          <span className="field-icon" style={{marginTop:2}}>🌊</span><span className="field-label" style={{marginTop:2}}>Tide</span>
          {tideStatus==="idle"       &&<span style={{fontSize:11,color:"#bbb"}}>— get GPS first</span>}
          {tideStatus==="loading"    &&<span className="status-badge status-loading">Loading…</span>}
          {tideStatus==="error"      &&<span className="status-badge status-error">API error</span>}
          {tideStatus==="unavailable"&&<span className="status-badge status-error">No data</span>}
          {tideStatus==="ok"&&tide&&(
            <div className="tide-bar-wrap">
              <div className="tide-value-line">
                <span className="tide-normalized">{tide.normalized!=null?tide.normalized.toFixed(2):"—"}</span>
                {tide.valueCM!=null&&<span className="tide-raw">({tide.valueCM} cm)</span>}
                {tide.normalized!=null&&<span className="tide-hint">{tideLabel(tide.normalized)}</span>}
              </div>
              {tide.normalized!=null&&<><div className="tide-bar-track"><div className="tide-bar-fill" style={{width:`${tide.normalized*100}%`}}/></div><div className="tide-bar-labels"><span>0.0 LAT{tide.latCM!=null?` (${tide.latCM}cm)`:""}</span><span>1.0 HAT{tide.hatCM!=null?` (${tide.hatCM}cm)`:""}</span></div></>}
            </div>
          )}
        </div>
        <div className="field-row"><span className="field-icon">🔵</span><span className="field-label">Pressure</span>{weather?.pressure!=null?<span className="field-value">{weather.pressure} hPa</span>:<input className="field-input" placeholder="e.g. 1013 hPa"/>}</div>
        <div className="field-row"><span className="field-icon">🌕</span><span className="field-label">Moon</span><span className="field-value">{weather?.moon??getMoonPhase(new Date())}</span></div>
        {!gps&&<div className="info-note">Get GPS fix to auto-load air temp, pressure & tide</div>}
        {tideStatus==="ok"&&<div className="info-note">Tide © Kartverket/NMA (CC BY 4.0)</div>}
      </div>

      <div className="field-group">
        <div className="field-group-title">Notes</div>
        <div className="field-row"><textarea className="field-input" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Hatches, retrieve, technique…" rows={3} style={{padding:"4px 0",resize:"none"}}/></div>
      </div>
      <button className="save-btn" onClick={handleSave} disabled={!species.trim()}>⊕ Record Catch</button>
    </>
  );
}

// ── Journal ───────────────────────────────────────────────────────────────────

function Journal({catches,observations,spots,trips,onSelCatch,onSelObs}){
  const spotName=id=>spots.find(s=>s.id===id)?.name||null;
  const items=[...catches.map(c=>({...c,_type:"catch"})),...observations.map(o=>({...o,_type:"obs"}))].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  if(!items.length)return(<div className="log-wrap"><div className="empty-state"><div className="empty-icon">🎣</div><div className="empty-text">Nothing logged yet</div></div></div>);
  return(
    <div className="log-wrap">
      {items.map(item=>item._type==="catch"?(
        <div key={item.id} className="catch-card" onClick={()=>onSelCatch(item)}>
          <div className="catch-card-header">
            {item.fishPhoto?<img src={item.fishPhoto} alt="fish" className="catch-thumb"/>:<div className="catch-thumb"><span className="catch-thumb-placeholder">🐟</span></div>}
            <div className="catch-meta">
              <div><div className="catch-species">{item.species}</div>{item.flyPattern&&<div style={{fontSize:10,color:"#888",marginTop:1}}>🪰 {item.flyPattern}</div>}</div>
              <div><div className="catch-date">{fmtDT(item.timestamp)}</div>{item.gps&&<div style={{fontSize:10,color:"var(--water)",fontFamily:"'Source Code Pro',monospace"}}>{formatCoords(item.gps.lat,item.gps.lon)}</div>}</div>
            </div>
          </div>
          <div className="catch-chips">
            {item.size&&<span className="chip">📏 {item.size}</span>}
            {item.weather?.airTemp!=null&&<span className="chip">🌡️ {item.weather.airTemp}°C</span>}
            {item.tide?.normalized!=null&&<span className="chip chip-tide">🌊 {item.tide.normalized.toFixed(2)} · {tideLabel(item.tide.normalized)}</span>}
            {item.weather?.moon&&<span className="chip">{item.weather.moon}</span>}
            {item.spotId&&spotName(item.spotId)&&<span className="chip chip-spot">📍 {spotName(item.spotId)}</span>}
          </div>
        </div>
      ):(
        <div key={item.id} className="obs-card" onClick={()=>onSelObs(item)}>
          <div className="obs-header"><span style={{fontSize:16}}>👁</span><span className="obs-species">{item.species}</span>{item.count&&<span className="obs-count">× {item.count}</span>}</div>
          <div className="obs-meta">
            <span>{fmtDT(item.timestamp)}</span>
            {item.estimatedSize&&<span>📏 {item.estimatedSize}</span>}
            {item.spotId&&spotName(item.spotId)&&<span>📍 {spotName(item.spotId)}</span>}
          </div>
        </div>
      ))}
    </div>
  );
}

          <div className="modal-grid">
            {c.flyPattern&&<div className="modal-stat"><div className="modal-stat-label">Fly</div><div className="modal-stat-value">{c.flyPattern}</div></div>}
            {c.size&&<div className="modal-stat"><div className="modal-stat-label">Size</div><div className="modal-stat-value">{c.size}</div></div>}
            <div className="modal-stat"><div className="modal-stat-label">Time</div><div className="modal-stat-value" style={{fontSize:11}}>{fmtDT(c.timestamp)}</div></div>
            {c.gps&&<div className="modal-stat"><div className="modal-stat-label">GPS</div><div className="modal-stat-value" style={{fontSize:10}}>{formatCoords(c.gps.lat,c.gps.lon)}</div></div>}
            {spot&&<div className="modal-stat"><div className="modal-stat-label">Spot</div><div className="modal-stat-value">{spot.name||"—"}</div></div>}
            {trip&&<div className="modal-stat"><div className="modal-stat-label">Session</div><div className="modal-stat-value">{trip.name}</div></div>}
          </div>
        </div>
        <div className="modal-section">
          <div className="modal-section-title">Conditions</div>
          <div className="modal-grid">
            {c.weather?.airTemp!=null&&<div className="modal-stat"><div className="modal-stat-label">Air Temp</div><div className="modal-stat-value">{c.weather.airTemp}°C</div></div>}
            {c.waterTemp&&<div className="modal-stat"><div className="modal-stat-label">Water Temp</div><div className="modal-stat-value">{c.waterTemp}</div></div>}
            {c.weather?.pressure!=null&&<div className="modal-stat"><div className="modal-stat-label">Pressure</div><div className="modal-stat-value">{c.weather.pressure} hPa</div></div>}
            {c.weather?.moon&&<div className="modal-stat"><div className="modal-stat-label">Moon</div><div className="modal-stat-value">{c.weather.moon}</div></div>}
          </div>
          {c.tide&&(
            <div style={{marginTop:10,background:"white",padding:"10px",borderRadius:4}}>
              <div className="modal-stat-label" style={{marginBottom:5}}>Tide Level (Kartverket)</div>
              <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
                {norm!=null&&<span style={{fontSize:21,fontWeight:700,color:"var(--water)"}}>{norm.toFixed(2)}</span>}
                {c.tide.valueCM!=null&&<span style={{fontSize:11,color:"#888"}}>{c.tide.valueCM} cm above CD</span>}
                {norm!=null&&<span style={{fontSize:11,color:"var(--water-light)",fontStyle:"italic"}}>{tideLabel(norm)}</span>}
              </div>
              {norm!=null&&<><div className="modal-tide-bar"><div className="modal-tide-fill" style={{width:`${norm*100}%`}}/></div><div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#aaa",marginTop:3}}><span>0.0 LAT{c.tide.latCM!=null?` (${c.tide.latCM}cm)`:""}</span><span>1.0 HAT{c.tide.hatCM!=null?` (${c.tide.hatCM}cm)`:""}</span></div></>}
              <div style={{fontSize:9,color:"#ccc",marginTop:4}}>© Kartverket/NMA · CC BY 4.0</div>
            </div>
          )}
        </div>
        {c.notes&&<div className="modal-section"><div className="modal-section-title">Notes</div><div className="modal-notes">{c.notes}</div></div>}
        <button className="delete-btn" onClick={()=>onDelete(c.id)}>Delete this catch</button>
      </div>
    </div>
  );
}

// ── Observation detail modal ──────────────────────────────────────────────────

function ObsDetail({obs:o,onClose,onDelete,trips,spots}){
  const trip=trips?.find(t=>t.id===o.tripId);
  const spot=spots?.find(s=>s.id===o.spotId);
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header"><div className="modal-title">👁 {o.species}</div><button className="modal-close" onClick={onClose}>×</button></div>
        <div className="modal-section">
          <div className="modal-section-title">Observation</div>
          <div className="modal-grid">
            {o.count&&<div className="modal-stat"><div className="modal-stat-label">Count</div><div className="modal-stat-value">{o.count} fish</div></div>}
            {o.estimatedSize&&<div className="modal-stat"><div className="modal-stat-label">Est. Size</div><div className="modal-stat-value">{o.estimatedSize}</div></div>}
            <div className="modal-stat"><div className="modal-stat-label">Time</div><div className="modal-stat-value" style={{fontSize:11}}>{fmtDT(o.timestamp)}</div></div>
            {o.gps&&<div className="modal-stat"><div className="modal-stat-label">GPS</div><div className="modal-stat-value" style={{fontSize:10}}>{formatCoords(o.gps.lat,o.gps.lon)}</div></div>}
            {spot&&<div className="modal-stat"><div className="modal-stat-label">Spot</div><div className="modal-stat-value">{spot.name||"—"}</div></div>}
            {trip&&<div className="modal-stat"><div className="modal-stat-label">Session</div><div className="modal-stat-value">{trip.name}</div></div>}
          </div>
        </div>
        {o.notes&&<div className="modal-section"><div className="modal-section-title">Notes</div><div className="modal-notes">{o.notes}</div></div>}
        <button className="delete-btn" onClick={()=>onDelete(o.id)}>Delete this observation</button>
      </div>
    </div>
  );
}

// ── Export tab ────────────────────────────────────────────────────────────────

function ExportTab({trips,spots,catches,observations}){
  const today=new Date().toISOString().slice(0,10);
  const sheets=[
    {title:"Sessions",      sub:"One row per fishing session, with totals.",  cols:["trip_id","name","start_time","end_time","duration_min","target_species","method","water_temp","spot_count","catch_count","obs_count","notes"],   count:trips.length,        fn:()=>dlCSV(tripsCSV(trips,spots,catches,observations),`fishlog_sessions_${today}.csv`)},
    {title:"Spots",         sub:"Each named location visited within a session.", cols:["spot_id","trip_id","trip_name","name","timestamp","gps_lat","gps_lon","line_type","water_temp","notes"],                                                   count:spots.length,        fn:()=>dlCSV(spotsCSV(spots,trips),`fishlog_spots_${today}.csv`)},
    {title:"Catches",       sub:"One row per fish caught, with all conditions.", cols:["catch_id","trip_id","spot_id","timestamp","species","fly_pattern","size","water_temp","air_temp_c","tide_normalized","moon_phase","notes"],    count:catches.length,      fn:()=>dlCSV(catchesCSV(catches,spots,trips),`fishlog_catches_${today}.csv`)},
    {title:"Observations",  sub:"Fish seen but not caught.",                  cols:["obs_id","trip_id","spot_id","timestamp","species","count","estimated_size","gps_lat","gps_lon","notes"],                                         count:observations.length, fn:()=>dlCSV(obsCSV(observations,spots,trips),`fishlog_observations_${today}.csv`)},
  ];
  return(
    <div className="export-wrap">
      {sheets.map(s=>(
        <div key={s.title} className="export-card">
          <div className="export-card-header"><div className="export-card-title">{s.title}</div><div className="export-card-sub">{s.sub}</div></div>
          <div className="export-card-stats"><div className="export-stat"><div className="export-stat-val">{s.count}</div><div className="export-stat-label">Rows</div></div></div>
          <div className="export-columns">{s.cols.map(c=><span key={c} className="export-col-chip">{c}</span>)}</div>
          <button className="export-btn" disabled={!s.count} onClick={s.fn}><span>↓ Download {s.title.toLowerCase()}.csv</span><span>📄</span></button>
        </div>
      ))}
      <div className="export-instructions">
        <div className="export-instructions-title">Import to Google Sheets</div>
        <div className="export-step"><div className="export-step-num">1</div><span>Download the CSVs you want</span></div>
        <div className="export-step"><div className="export-step-num">2</div><span>Create a Google Sheet with four tabs: <strong>Sessions, Spots, Catches, Observations</strong></span></div>
        <div className="export-step"><div className="export-step-num">3</div><span>On each tab: <strong>File → Import → Replace current sheet</strong></span></div>
        <div className="export-step"><div className="export-step-num">4</div><span>Future exports: use <strong>Replace data from selected cell</strong> to keep your formulas</span></div>
        <div className="export-step"><div className="export-step-num">5</div><span>Join on <strong>trip_id</strong> and <strong>spot_id</strong> for comparisons and pivot tables</span></div>
      </div>
      <div style={{fontSize:10,color:"#bbb",textAlign:"center",paddingBottom:8,lineHeight:1.6}}>Photos stored locally only · Connect Google later for Drive sync</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FishLog />);

      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
